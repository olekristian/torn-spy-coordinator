<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spy Portal</title>
  <style>
    :root { --bg:#f4efe7; --panel:rgba(255,255,255,.88); --ink:#1f1b18; --muted:#6a6058; --line:rgba(58,41,28,.12); --brand:#0e6a5a; --brand-2:#cf7141; --good:#1f8b4c; --warn:#ad6b12; --bad:#b33b3b; --shadow:0 22px 50px rgba(33,21,12,.12); --radius:18px; }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"Segoe UI",Tahoma,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,rgba(207,113,65,.18),transparent 28%),radial-gradient(circle at right,rgba(14,106,90,.16),transparent 30%),linear-gradient(180deg,#f6f0e8 0%,#eee5d9 100%)}
    a{color:inherit}.shell{max-width:1280px;margin:0 auto;padding:20px 16px 48px}.hero,.panel,.card,.auth-card,.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
    .hero,.panel,.card{padding:16px}.hero{margin-bottom:16px}.hero h1{margin:0 0 8px;font-size:clamp(1.9rem,4vw,3.4rem);line-height:1}.muted,.small{color:var(--muted)}.small{font-size:.86rem}
    .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:16px}.auth-card{width:min(1060px,100%);padding:18px}.auth-grid,.hero-grid,.grid,.stats,.two-col,.stack{display:grid;gap:14px}.auth-grid{grid-template-columns:1.1fr .9fr}.hero-grid{grid-template-columns:2fr 1fr;align-items:start}.grid{grid-template-columns:repeat(12,minmax(0,1fr))}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:16px}.two-col{grid-template-columns:repeat(2,minmax(0,1fr))}.stack{grid-template-columns:1fr}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-7{grid-column:span 7}.span-6{grid-column:span 6}.span-5{grid-column:span 5}.span-4{grid-column:span 4}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.row>*{flex:1 1 0}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    button,input,textarea,select{width:100%;font:inherit;color:var(--ink);border-radius:14px;border:1px solid rgba(47,31,18,.16);padding:12px 13px;background:rgba(255,255,255,.92)}
    button{cursor:pointer;border:0;color:#fff;font-weight:700;background:linear-gradient(135deg,var(--brand),#0b5649)}button.secondary{color:var(--ink);background:rgba(255,255,255,.7);border:1px solid var(--line)}button.warn{background:linear-gradient(135deg,#d07e2f,#b25e18)}button.bad{background:linear-gradient(135deg,#c94646,#9f2d2d)}button:disabled{opacity:.6;cursor:not-allowed}
    label{display:block;margin-bottom:6px;font-size:.92rem;font-weight:600}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(14,106,90,.1);color:var(--brand);font-size:.85rem;font-weight:700}.pill.good{background:rgba(31,139,76,.12);color:var(--good)}.pill.warn{background:rgba(173,107,18,.14);color:var(--warn)}.pill.bad{background:rgba(179,59,59,.14);color:var(--bad)}.card-value{font-size:1.8rem;font-weight:700}
    .notice{margin-bottom:12px;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.78)}.notice.good{border-color:rgba(31,139,76,.24);background:rgba(31,139,76,.08)}.notice.bad{border-color:rgba(179,59,59,.24);background:rgba(179,59,59,.08)}
    .list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.68);padding:14px}.item h3,.item h4,.panel h2{margin:0 0 8px}.table-wrap{overflow:auto}table{width:100%;min-width:780px;border-collapse:collapse}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);vertical-align:top}th{font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}.hidden{display:none!important}
    @media (max-width:920px){.auth-grid,.hero-grid,.two-col,.stats{grid-template-columns:1fr}.span-8,.span-7,.span-6,.span-5,.span-4{grid-column:span 12}table{min-width:0}th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}}
  </style>
</head>
<body>
  <div id="auth" class="auth-wrap"></div>
  <div id="app" class="shell hidden"></div>
  <script>
    const API_BASE = `${window.location.origin}/api`;
    const TOKEN_KEY = "spyPortalApiToken";
    const ORDER_STATUSES = ["draft", "open", "in_progress", "completed", "delivered", "closed", "cancelled"];
    const PAYMENT_STATUSES = ["unpaid", "partially_paid", "paid", "refunded", "waived"];
    const PAYOUT_STATUSES = ["unpaid", "queued", "paid", "cancelled", "disputed"];
    const ROLE_OPTIONS = ["lawfirm_admin", "coordinator", "spy_seller", "client_requester"];
    const state = { token: localStorage.getItem(TOKEN_KEY) || "", bootstrap: null, ui: { tab: "dashboard", selectedOrderId: "", flash: null } };
    function setToken(token){ state.token = token || ""; if(state.token) localStorage.setItem(TOKEN_KEY,state.token); else localStorage.removeItem(TOKEN_KEY); }
    function setFlash(type,text){ state.ui.flash={type,text}; render(); }
    function roleLabel(value){ return String(value||"").replace(/_/g," "); }
    function html(strings,...values){ return strings.reduce((out,part,i)=>out+part+(values[i]??""),""); }
    function escapeHtml(value){ return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }
    function formatMoney(value){ return Number(value||0).toLocaleString(); }
    function formatDate(value){ return value ? new Date(value).toLocaleString() : "-"; }
    async function api(path, options={}){ const headers={"Content-Type":"application/json", ...(options.headers||{})}; if(state.token) headers.Authorization=`Bearer ${state.token}`; const response=await fetch(`${API_BASE}${path}`,{...options,headers}); const text=await response.text(); const payload=text?JSON.parse(text):{}; if(!response.ok) throw new Error(payload.error || `Request failed with ${response.status}`); return payload; }
    function bootstrap(){ return state.bootstrap || { user:null, users:[], memberships:[], firms:[], sellerProfiles:[], orders:[], orderItems:[], payments:[], payouts:[], notifications:[], invitations:[], apiConsents:[] }; }
    function currentUser(){ return bootstrap().user; }
    function currentMembership(){ return bootstrap().memberships[0] || null; }
    function currentRole(){ return currentMembership() ? currentMembership().role : ""; }
    function currentFirm(){ const membership=currentMembership(); return membership ? bootstrap().firms.find((firm)=>firm.id===membership.firm_id) || null : null; }
    function firmName(firmId){ const firm=bootstrap().firms.find((entry)=>entry.id===firmId); return firm ? firm.name : "Unknown"; }
    function itemsForOrder(orderId){ return bootstrap().orderItems.filter((item)=>item.order_id===orderId); }
    function orderFinancials(orderId){ const order=bootstrap().orders.find((entry)=>entry.id===orderId) || {}; const items=itemsForOrder(orderId); const itemIds=new Set(items.map((item)=>item.id)); const payments=bootstrap().payments.filter((entry)=>entry.order_id===orderId); const payouts=bootstrap().payouts.filter((entry)=>itemIds.has(entry.item_id)); return { charged:Number(order.agreed_price||0), received:payments.reduce((sum,entry)=>sum+Number(entry.amount||0),0), payouts:payouts.reduce((sum,entry)=>sum+Number(entry.amount||0),0), count:items.length, submitted:items.filter((item)=>item.status==="submitted").length }; }
    async function refreshBootstrap(){ if(!state.token) return; state.bootstrap = await api('/bootstrap'); if(!state.ui.selectedOrderId && bootstrap().orders[0]) state.ui.selectedOrderId = bootstrap().orders[0].id; }
    function parseSpyInput(raw){ const text=String(raw||""); const statsFor=(label)=>{ const match=text.match(new RegExp(`${label}:\\s*([0-9,]+|N\\/A)`, 'i')); if(!match) return null; if(/n\/a/i.test(match[1])) return null; return Number(match[1].replace(/,/g,'')); }; const nameMatch=text.match(/Name:\s*([^\r\n]+)/i); const idMatch=text.match(/\[(\d{3,})\]/); const parsedName=nameMatch ? nameMatch[1].replace(/\s*\[[0-9]+\]\s*$/,'').trim() : ''; const stats={ strength:statsFor('Strength'), speed:statsFor('Speed'), dexterity:statsFor('Dexterity'), defense:statsFor('Defense'), total:statsFor('Total battle stats') }; const missing=[]; if(stats.strength==null) missing.push('Strength'); if(stats.speed==null) missing.push('Speed'); if(stats.dexterity==null) missing.push('Dexterity'); if(stats.defense==null) missing.push('Defense'); if(stats.total==null && missing.length===0) stats.total=stats.strength+stats.speed+stats.dexterity+stats.defense; return { parsedName, targetId:idMatch ? idMatch[1] : '', level:null, stats, missingStats:missing }; }
    async function safeAction(fn, successMessage){ try{ await fn(); await refreshBootstrap(); setFlash('ok', successMessage); } catch(error){ setFlash('error', error.message); } }
    async function login(email,password){ const payload=await api('/auth/login',{ method:'POST', body:JSON.stringify({email,password}) }); setToken(payload.token); state.bootstrap=payload.bootstrap; if(bootstrap().orders[0]) state.ui.selectedOrderId=bootstrap().orders[0].id; }
    async function onLogin(){ await safeAction(()=>login(document.getElementById('login-email').value, document.getElementById('login-password').value),'Logged in.'); }
    async function onRegisterSeller(){ await safeAction(()=>api('/register/seller',{ method:'POST', body:JSON.stringify({ name:document.getElementById('seller-name').value, email:document.getElementById('seller-email').value, password:document.getElementById('seller-password').value, payoutHandle:document.getElementById('seller-payout').value, rateCard:document.getElementById('seller-rate').value, notes:document.getElementById('seller-notes').value }) }),'Seller account created. Await admin approval.'); }
    async function onRegisterClient(){ await safeAction(()=>api('/register/client',{ method:'POST', body:JSON.stringify({ firmName:document.getElementById('client-firm').value, name:document.getElementById('client-name').value, email:document.getElementById('client-email').value, password:document.getElementById('client-password').value }) }),'Law firm account created.'); }
    async function onAcceptInvite(){ await safeAction(async()=>{ const payload=await api('/invites/accept',{ method:'POST', body:JSON.stringify({ token:document.getElementById('invite-token').value, name:document.getElementById('invite-name').value, password:document.getElementById('invite-password').value, payoutHandle:document.getElementById('invite-payout').value, rateCard:document.getElementById('invite-rate').value, notes:document.getElementById('invite-notes').value }) }); setToken(payload.token); state.bootstrap=payload.bootstrap; },'Invite accepted.'); }
    async function onCreateMember(){ await safeAction(()=>api('/members',{ method:'POST', body:JSON.stringify({ name:document.getElementById('member-name').value, email:document.getElementById('member-email').value, password:document.getElementById('member-password').value, role:document.getElementById('member-role').value, payoutHandle:document.getElementById('member-payout').value, rateCard:document.getElementById('member-rate').value, notes:document.getElementById('member-notes').value }) }),'Member created.'); }
    async function onCreateInvite(){ await safeAction(async()=>{ const payload=await api('/invites',{ method:'POST', body:JSON.stringify({ email:document.getElementById('invite-email-create').value, role:document.getElementById('invite-role-create').value, note:document.getElementById('invite-note-create').value }) }); setFlash('ok', `Invite created. Token: ${payload.token}`); await refreshBootstrap(); },'Invite created.'); }
    async function onCreateOrder(){ await safeAction(()=>api('/orders',{ method:'POST', body:JSON.stringify({ title:document.getElementById('order-title').value, clientFirmId:document.getElementById('order-client').value, dueDate:document.getElementById('order-due').value, agreedPrice:Number(document.getElementById('order-price').value||0), defaultPayout:Number(document.getElementById('item-payout').value||0), notes:document.getElementById('order-notes').value, targets:document.getElementById('order-targets').value }) }),'Order created.'); }
    async function onUpdateOrderStatus(orderId){ await safeAction(()=>api(`/orders/${orderId}/status`,{ method:'PATCH', body:JSON.stringify({ status:document.getElementById(`order-status-${orderId}`).value }) }),'Order status updated.'); }
    async function onClaimItem(itemId){ await safeAction(()=>api(`/items/${itemId}/claim`,{ method:'POST', body:'{}' }),'Target claimed.'); }
    async function onUnclaimItem(itemId){ await safeAction(()=>api(`/items/${itemId}/unclaim`,{ method:'POST', body:'{}' }),'Target unclaimed.'); }
    async function onSubmitItem(itemId){ const rawSpy=document.getElementById(`spy-${itemId}`).value; const parsed=parseSpyInput(rawSpy); if(parsed.missingStats.length){ const confirmed=window.confirm(`This is a partial spy. Missing: ${parsed.missingStats.join(', ')}. Submit anyway?`); if(!confirmed) return; } await safeAction(()=>api(`/items/${itemId}/submit`,{ method:'POST', body:JSON.stringify({ rawSpy, parsedName:parsed.parsedName, targetId:parsed.targetId, level:parsed.level, stats:parsed.stats, missingStats:parsed.missingStats, completedByUserId:document.getElementById(`done-by-${itemId}`).value, payoutAmount:Number(document.getElementById(`payout-${itemId}`).value||0), payoutStatus:'queued', payoutNotes:document.getElementById(`payout-note-${itemId}`).value }) }),'Spy submitted.'); }
    async function onAddPayment(){ await safeAction(()=>api('/payments',{ method:'POST', body:JSON.stringify({ orderId:document.getElementById('payment-order').value, amount:Number(document.getElementById('payment-amount').value||0), status:document.getElementById('payment-status').value, note:document.getElementById('payment-note').value }) }),'Payment recorded.'); }
    async function onUpdatePayoutStatus(payoutId,status){ await safeAction(()=>api(`/payouts/${payoutId}/status`,{ method:'PATCH', body:JSON.stringify({status}) }),'Payout status updated.'); }
    async function onUpdateSellerStatus(userId,status){ await safeAction(()=>api(`/sellers/${userId}/status`,{ method:'PATCH', body:JSON.stringify({status}) }),'Seller status updated.'); }
    async function onSaveFirmSettings(){ const firm=currentFirm(); if(!firm) return; await safeAction(()=>api(`/firms/${firm.id}`,{ method:'PATCH', body:JSON.stringify({ name:document.getElementById('firm-name').value, discordWebhook:document.getElementById('firm-webhook').value }) }),'Firm settings saved.'); }
    async function onSaveApiConsent(){ const rawKey=document.getElementById('api-key').value.trim(); if(!rawKey) { setFlash('error','API key is required.'); return; } await safeAction(()=>api('/api-consents',{ method:'POST', body:JSON.stringify({ maskedKey:`${rawKey.slice(0,4)}...${rawKey.slice(-3)}`, scope:document.getElementById('api-scope').value, note:document.getElementById('api-note').value }) }),'API consent saved.'); }
    async function onDeleteApiConsent(){ await safeAction(()=>api('/api-consents/active',{ method:'DELETE' }),'API consent revoked.'); }
    function logout(){ setToken(''); state.bootstrap=null; state.ui={ tab:'dashboard', selectedOrderId:'', flash:null }; render(); }
    function renderAuth(){ document.getElementById('auth').innerHTML = html`
      <div class="auth-card"><div class="auth-grid"><section class="hero"><span class="pill">Backend connected</span><h1>Multi-firm spy operations with real local persistence.</h1><p class="muted">This portal now uses the Express + SQLite backend in this repo. Accounts, orders, invites, payouts and payments are stored in the local database instead of browser-only state.</p><div class="stats"><div class="card"><div class="small">Seed admin</div><div class="card-value">admin@spyportal.local</div><div class="small">admin123</div></div><div class="card"><div class="small">Seed coordinator</div><div class="card-value">coord@spyportal.local</div><div class="small">coord123</div></div><div class="card"><div class="small">Seed client</div><div class="card-value">client@helsing.local</div><div class="small">client123</div></div><div class="card"><div class="small">Manual-first</div><div class="card-value">API key optional</div><div class="small">for future automation only</div></div></div></section><section class="stack"><div class="panel"><h2>Login</h2><div class="small" style="margin-bottom:10px">Need the current operational board instead? Open <a href="./index.html">index.html</a>.</div><div class="stack"><div><label>Email</label><input id="login-email" type="email" value="admin@spyportal.local"></div><div><label>Password</label><input id="login-password" type="password" value="admin123"></div><button onclick="onLogin()">Login</button></div></div><div class="panel"><h2>Accept invite</h2><div class="stack"><input id="invite-token" placeholder="Invite token"><input id="invite-name" placeholder="Display name"><input id="invite-password" type="password" placeholder="Password"><input id="invite-payout" placeholder="Payout handle if seller"><input id="invite-rate" placeholder="Rate card if seller"><textarea id="invite-notes" rows="2" placeholder="Notes"></textarea><button class="secondary" onclick="onAcceptInvite()">Join with invite</button></div></div><div class="two-col"><div class="panel"><h2>Register seller</h2><div class="stack"><input id="seller-name" placeholder="Display name"><input id="seller-email" type="email" placeholder="Email"><input id="seller-password" type="password" placeholder="Password"><input id="seller-payout" placeholder="Payout handle or wallet"><input id="seller-rate" placeholder="Rate card e.g. 3.5m per spy"><textarea id="seller-notes" rows="3" placeholder="Specialties or notes"></textarea><button class="secondary" onclick="onRegisterSeller()">Create seller account</button></div></div><div class="panel"><h2>Register law firm</h2><div class="stack"><input id="client-firm" placeholder="Law firm name"><input id="client-name" placeholder="Contact name"><input id="client-email" type="email" placeholder="Email"><input id="client-password" type="password" placeholder="Password"><button class="secondary" onclick="onRegisterClient()">Create law firm account</button></div></div></div></section></div></div>`; }
    function renderDashboard(orders,pendingSellers){ return html`<section class="grid"><div class="span-8 panel"><h2>Recent orders</h2><div class="list">${orders.slice(0,6).map((order)=>{ const financials=orderFinancials(order.id); return `<div class="item"><div class="row"><div><h3>${escapeHtml(order.title)}</h3><div class="small">${escapeHtml(firmName(order.client_firm_id))} � ${escapeHtml(order.status)} � ${financials.submitted}/${financials.count} submitted</div><div class="small">Paid in ${formatMoney(financials.received)} / Payouts ${formatMoney(financials.payouts)}</div></div><button class="secondary" onclick="openOrder('${order.id}')">Open</button></div></div>`; }).join('') || "<div class='small'>No orders available.</div>"}</div></div><div class="span-4 stack"><div class="panel"><h2>Seller queue</h2><div class="small">${pendingSellers.length} seller accounts are waiting for approval.</div></div><div class="panel"><h2>Notifications</h2><div class="list">${bootstrap().notifications.slice(0,6).map((note)=>`<div class="item"><strong>${escapeHtml(note.message)}</strong><div class="small">${escapeHtml(note.status)} � ${formatDate(note.created_at)}</div></div>`).join('') || "<div class='small'>No notifications yet.</div>"}</div></div></div></section>`; }
    function renderOrders(selectedOrder,items,approvedSellers){ const firms=bootstrap().firms.filter((firm)=>firm.type==='client'); const canCreate=['super_admin','coordinator','lawfirm_admin','client_requester'].includes(currentRole()); return html`<section class="grid"><div class="span-4 stack">${canCreate ? `<div class="panel"><h2>Create order</h2><div class="stack"><input id="order-title" placeholder="Order title"><select id="order-client">${firms.map((firm)=>`<option value="${firm.id}" ${currentFirm() && currentFirm().id===firm.id ? 'selected' : ''}>${escapeHtml(firm.name)}</option>`).join('')}</select><div class="row"><input id="order-due" type="date"><input id="order-price" type="number" min="0" step="1" placeholder="Total price"></div><input id="item-payout" type="number" min="0" step="1" placeholder="Default payout per spy"><textarea id="order-notes" rows="3" placeholder="Notes"></textarea><textarea id="order-targets" rows="8" placeholder="Paste targets here"></textarea><button onclick="onCreateOrder()">Create order</button></div></div>` : ''}<div class="panel"><h2>Orders</h2><div class="list">${bootstrap().orders.map((order)=>`<div class="item"><div class="row"><div><h4>${escapeHtml(order.title)}</h4><div class="small">${escapeHtml(firmName(order.client_firm_id))} � ${escapeHtml(order.status)} � ${escapeHtml(order.payment_status)}</div></div><button class="secondary" onclick="openOrder('${order.id}')">Open</button></div></div>`).join('')}</div></div></div><div class="span-8 stack">${selectedOrder ? (()=>{ const financials=orderFinancials(selectedOrder.id); return `<div class="panel"><div class="row"><div><h2>${escapeHtml(selectedOrder.title)}</h2><div class="small">${escapeHtml(firmName(selectedOrder.client_firm_id))} � ${escapeHtml(selectedOrder.status)} � Due ${escapeHtml(selectedOrder.due_date || 'Not set')}</div><div class="small">Requested by ${escapeHtml(selectedOrder.requested_by_user_id)} � Created by ${escapeHtml(selectedOrder.created_by_user_id)}</div></div><span class="pill">${escapeHtml(selectedOrder.payment_status)}</span></div><p class="muted">${escapeHtml(selectedOrder.notes || 'No notes.')}</p><div class="row" style="margin-bottom:14px"><select id="order-status-${selectedOrder.id}">${ORDER_STATUSES.map((status)=>`<option value="${status}" ${status===selectedOrder.status ? 'selected' : ''}>${escapeHtml(status)}</option>`).join('')}</select><button class="secondary" onclick="onUpdateOrderStatus('${selectedOrder.id}')">Update order status</button></div><div class="stats"><div class="card"><div class="small">Targets</div><div class="card-value">${financials.count}</div><div class="small">${financials.submitted} submitted</div></div><div class="card"><div class="small">Customer total</div><div class="card-value">${formatMoney(financials.charged)}</div><div class="small">Received ${formatMoney(financials.received)}</div></div><div class="card"><div class="small">Staff payouts</div><div class="card-value">${formatMoney(financials.payouts)}</div><div class="small">Margin ${formatMoney(financials.received-financials.payouts)}</div></div><div class="card"><div class="small">Outstanding</div><div class="card-value">${formatMoney(Math.max(0,financials.charged-financials.received))}</div><div class="small">Customer receivable</div></div></div><div class="list" style="margin-top:14px">${items.map((item)=>`<div class="item"><div class="row"><div><h4>${escapeHtml(item.target_name)} ${item.target_id ? `<span class="small">[${escapeHtml(item.target_id)}]</span>` : ''}</h4><div class="small">${escapeHtml(item.status)} � Claimed by ${escapeHtml(item.claimed_by_user_id || 'nobody')} � Completed by ${escapeHtml(item.completed_by_user_id || '-')}</div></div>${item.status==='open' ? `<button onclick="onClaimItem('${item.id}')">Claim</button>` : ''}${item.status==='claimed' ? `<button class="secondary" onclick="onUnclaimItem('${item.id}')">Unclaim</button>` : ''}</div>${(item.status==='claimed' || ['super_admin','coordinator','lawfirm_admin'].includes(currentRole())) ? `<div class="stack" style="margin-top:10px"><textarea id="spy-${item.id}" rows="5" placeholder="Paste raw spy text"></textarea><div class="row"><select id="done-by-${item.id}"><option value="${currentUser().id}">Completed by me</option>${approvedSellers.map((profile)=>`<option value="${profile.user_id}">${escapeHtml(userName(profile.user_id))}</option>`).join('')}</select><input id="payout-${item.id}" type="number" min="0" step="1" value="${escapeHtml(item.payout_amount || 0)}"></div><input id="payout-note-${item.id}" placeholder="Payout note"><button class="warn" onclick="onSubmitItem('${item.id}')">Submit spy</button></div>` : ''}</div>`).join('') || "<div class='small'>This order has no items.</div>"}</div></div>`; })() : `<div class="panel"><div class="small">Select an order to continue.</div></div>`}</div></section>`; }
    function renderTargets(){ return html`<div class="table-wrap panel"><h2>Targets board</h2><table><thead><tr><th>Target</th><th>Order</th><th>Status</th><th>Claimed By</th><th>Completed By</th><th>Action</th></tr></thead><tbody>${bootstrap().orderItems.map((item)=>`<tr><td>${escapeHtml(item.target_name)} ${item.target_id ? `<span class="small">[${escapeHtml(item.target_id)}]</span>` : ''}</td><td>${escapeHtml((bootstrap().orders.find((order)=>order.id===item.order_id) || {}).title || '')}</td><td>${escapeHtml(item.status)}</td><td>${escapeHtml(userName(item.claimed_by_user_id) || '-')}</td><td>${escapeHtml(userName(item.completed_by_user_id) || '-')}</td><td>${item.status==='open' ? `<button onclick="onClaimItem('${item.id}')">Claim</button>` : ''}${item.status==='claimed' ? `<button class="secondary" onclick="onUnclaimItem('${item.id}')">Unclaim</button>` : ''}${item.status==='submitted' ? `<span class="pill good">Done</span>` : ''}</td></tr>`).join('')}</tbody></table></div>`; }
    function renderPayroll(){ const isManager=['super_admin','coordinator'].includes(currentRole()); const payouts=isManager ? bootstrap().payouts : bootstrap().payouts.filter((entry)=>entry.user_id===currentUser().id); return html`<div class="table-wrap panel"><h2>Payroll</h2><table><thead><tr><th>Seller</th><th>Amount</th><th>Status</th><th>Item</th><th>Notes</th><th>Action</th></tr></thead><tbody>${payouts.map((payout)=>{ const item=bootstrap().orderItems.find((entry)=>entry.id===payout.item_id) || {}; return `<tr><td>${escapeHtml(userName(payout.user_id))}</td><td>${formatMoney(payout.amount || 0)}</td><td>${escapeHtml(payout.status)}</td><td>${escapeHtml(item.target_name || '')}</td><td>${escapeHtml(payout.notes || '')}</td><td>${isManager ? `<select onchange="onUpdatePayoutStatus('${payout.id}', this.value)">${PAYOUT_STATUSES.map((status)=>`<option value="${status}" ${status===payout.status ? 'selected' : ''}>${status}</option>`).join('')}</select>` : `<span class='small'>Read only</span>`}</td></tr>`; }).join('') || "<tr><td colspan='6'>No payouts yet.</td></tr>"}</tbody></table></div>`; }
    function renderPayments(){ return html`<section class="grid"><div class="span-5 stack"><div class="panel"><h2>Register payment</h2><div class="stack"><select id="payment-order">${bootstrap().orders.map((order)=>`<option value="${order.id}">${escapeHtml(order.title)}</option>`).join('')}</select><input id="payment-amount" type="number" min="0" step="1" placeholder="Amount"><select id="payment-status">${PAYMENT_STATUSES.map((status)=>`<option value="${status}">${status}</option>`).join('')}</select><textarea id="payment-note" rows="3" placeholder="Payment note"></textarea><button onclick="onAddPayment()">Save payment</button></div></div><div class="panel"><h2>Receivables</h2><div class="list">${bootstrap().orders.map((order)=>{ const financials=orderFinancials(order.id); return `<div class="item"><strong>${escapeHtml(order.title)}</strong><div class="small">Charge ${formatMoney(financials.charged)} � Received ${formatMoney(financials.received)} � Outstanding ${formatMoney(Math.max(0,financials.charged-financials.received))}</div></div>`; }).join('')}</div></div></div><div class="span-7 table-wrap panel"><h2>Payments</h2><table><thead><tr><th>Order</th><th>Amount</th><th>Status</th><th>Recorded By</th><th>Created</th></tr></thead><tbody>${bootstrap().payments.map((payment)=>`<tr><td>${escapeHtml((bootstrap().orders.find((order)=>order.id===payment.order_id) || {}).title || '')}</td><td>${formatMoney(payment.amount || 0)}</td><td>${escapeHtml(payment.status)}</td><td>${escapeHtml(userName(payment.created_by_user_id))}</td><td>${formatDate(payment.created_at)}</td></tr>`).join('') || "<tr><td colspan='5'>No payments recorded.</td></tr>"}</tbody></table></div></section>`; }
    function renderTeam(){ const canManage=['super_admin','lawfirm_admin','coordinator'].includes(currentRole()); return html`<section class="grid"><div class="span-5 stack">${canManage ? `<div class="panel"><h2>Add team member</h2><div class="stack"><input id="member-name" placeholder="Display name"><input id="member-email" type="email" placeholder="Email"><input id="member-password" type="password" placeholder="Temporary password"><select id="member-role">${ROLE_OPTIONS.map((role)=>`<option value="${role}">${escapeHtml(roleLabel(role))}</option>`).join('')}</select><input id="member-payout" placeholder="Payout handle (seller only)"><input id="member-rate" placeholder="Rate card (seller only)"><textarea id="member-notes" rows="3" placeholder="Notes"></textarea><button onclick="onCreateMember()">Create member</button></div></div><div class="panel"><h2>Create invite</h2><div class="stack"><input id="invite-email-create" type="email" placeholder="Invite email"><select id="invite-role-create">${ROLE_OPTIONS.map((role)=>`<option value="${role}">${escapeHtml(roleLabel(role))}</option>`).join('')}</select><textarea id="invite-note-create" rows="2" placeholder="Invite note"></textarea><button onclick="onCreateInvite()">Generate invite token</button></div></div>` : ''}<div class="panel"><h2>Seller approval queue</h2><div class="list">${bootstrap().sellerProfiles.map((profile)=>`<div class="item"><h4>${escapeHtml(userName(profile.user_id))}</h4><div class="small">${escapeHtml(profile.status)} � manual ${profile.manual_capable ? 'enabled' : 'disabled'} � API ${profile.api_connected ? 'connected' : 'not connected'}</div><div class="small">${escapeHtml(profile.rate_card || 'No rate card')} � ${escapeHtml(profile.payout_handle || 'No payout handle')}</div>${canManage ? `<div class="row" style="margin-top:8px"><button onclick="onUpdateSellerStatus('${profile.user_id}','approved')">Approve</button><button class="warn" onclick="onUpdateSellerStatus('${profile.user_id}','suspended')">Suspend</button><button class="bad" onclick="onUpdateSellerStatus('${profile.user_id}','rejected')">Reject</button></div>` : ''}</div>`).join('') || "<div class='small'>No sellers registered.</div>"}</div></div><div class="panel"><h2>Open invites</h2><div class="list">${bootstrap().invitations.filter((invite)=>invite.status==='pending').map((invite)=>`<div class="item"><strong>${escapeHtml(invite.email)}</strong><div class="small">${escapeHtml(firmName(invite.firm_id))} � ${escapeHtml(roleLabel(invite.role))} � token ${escapeHtml(invite.token)}</div><div class="small">Expires ${formatDate(invite.expires_at)}</div></div>`).join('') || "<div class='small'>No active invites.</div>"}</div></div></div><div class="span-7 table-wrap panel"><h2>Memberships</h2><table><thead><tr><th>User Id</th><th>Firm</th><th>Role</th><th>Status</th><th>Created</th></tr></thead><tbody>${bootstrap().memberships.map((membership)=>`<tr><td>${escapeHtml(userName(membership.user_id))}</td><td>${escapeHtml(firmName(membership.firm_id))}</td><td>${escapeHtml(roleLabel(membership.role))}</td><td>${escapeHtml(membership.status)}</td><td>${formatDate(membership.created_at)}</td></tr>`).join('')}</tbody></table></div></section>`; }
    function renderSettings(){ const firm=currentFirm() || {}; const activeConsent=bootstrap().apiConsents.find((entry)=>entry.status==="active"); return html`<section class="grid"><div class="span-6 stack"><div class="panel"><h2>API key consent</h2><p class="muted">Manual submission remains available. Save API consent here if you want future server-side automation hooks.</p><div class="stack"><input id="api-scope" placeholder="Requested scope e.g. user/log custom key" value="${escapeHtml(activeConsent ? activeConsent.scope : "")}"><input id="api-key" placeholder="API key" value=""><textarea id="api-note" rows="3" placeholder="Consent note">${escapeHtml(activeConsent ? activeConsent.note : "")}</textarea><div class="row"><button onclick="onSaveApiConsent()">${activeConsent ? "Update consent" : "Save consent"}</button>${activeConsent ? `<button class="bad" onclick="onDeleteApiConsent()">Revoke</button>` : ``}</div><div class="small">${activeConsent ? `Connected: ${escapeHtml(activeConsent.masked_key)} · ${escapeHtml(activeConsent.scope)}` : "No active API consent stored."}</div></div></div><div class="panel"><h2>Data source</h2><div class="list"><div class="item"><strong>API base</strong><div class="small">${escapeHtml(API_BASE)}</div></div><div class="item"><strong>Persistence</strong><div class="small">SQLite via local Express backend</div></div><div class="item"><strong>Legacy board</strong><div class="small"><a href="./index.html">Open legacy operations board</a></div></div></div></div></div><div class="span-6 stack"><div class="panel"><h2>Firm integration</h2><div class="stack"><input id="firm-name" value="${escapeHtml(firm.name || '')}" placeholder="Firm name"><input id="firm-webhook" value="${escapeHtml(firm.discord_webhook || '')}" placeholder="Discord webhook URL"><button onclick="onSaveFirmSettings()">Save firm settings</button><div class="small">Discord is treated as a notification channel only.</div></div></div><div class="panel"><h2>Operations guide</h2><div class="list"><div class="item"><strong>1. Invite or create members</strong><div class="small">Use Team for direct member creation or invite tokens.</div></div><div class="item"><strong>2. Create orders</strong><div class="small">Paste targets into Orders and set customer pricing + default payout.</div></div><div class="item"><strong>3. Run manual operations</strong><div class="small">Claim, submit spies, record payments and update payouts.</div></div><div class="item"><strong>4. Close work</strong><div class="small">Advance order status to delivered or closed after completion.</div></div></div></div></div></section>`; }
    function renderPolicies(){ return html`<section class="grid"><div class="span-6 panel"><h2>Privacy Policy</h2><p class="muted">This portal stores accounts, firms, memberships, orders, submissions, payments, payouts, notifications and invites in the local SQLite database used by the backend.</p></div><div class="span-6 panel"><h2>API Usage Policy</h2><p class="muted">Use documented Torn API capabilities only. Manual submission is the primary supported workflow today. Future Torn automation should be implemented server-side with explicit consent and narrow scopes.</p></div></section>`; }
    function openOrder(orderId){ state.ui.selectedOrderId=orderId; state.ui.tab='orders'; render(); }
    function renderApp(){ const user=currentUser(); const role=currentRole(); const orders=bootstrap().orders; const selectedOrder=orders.find((order)=>order.id===(state.ui.selectedOrderId || (orders[0] && orders[0].id))) || null; if(!state.ui.selectedOrderId && selectedOrder) state.ui.selectedOrderId=selectedOrder.id; const items=selectedOrder ? itemsForOrder(selectedOrder.id) : []; const pendingSellers=bootstrap().sellerProfiles.filter((profile)=>profile.status==='pending'); const approvedSellers=bootstrap().sellerProfiles.filter((profile)=>profile.status==='approved'); const firm=currentFirm(); document.getElementById('app').innerHTML = html`<section class="hero"><div class="hero-grid"><div><span class="pill">${escapeHtml(roleLabel(role))}</span><h1>${escapeHtml(firm ? firm.name : 'Spy Portal')}</h1><p class="muted">${escapeHtml(user.name)} is signed in through the backend API. Orders, invites, payouts and payments now persist in SQLite instead of browser-only state.</p></div><div class="stack"><div class="card"><div class="small">Orders visible</div><div class="card-value">${orders.length}</div></div><div class="row"><button class="secondary" onclick="state.ui.tab='policies';render()">Policies</button><button class="bad" onclick="logout()">Logout</button></div></div></div><div class="stats"><div class="card"><div class="small">Open items</div><div class="card-value">${bootstrap().orderItems.filter((item)=>item.status==='open').length}</div></div><div class="card"><div class="small">Claimed items</div><div class="card-value">${bootstrap().orderItems.filter((item)=>item.status==='claimed').length}</div></div><div class="card"><div class="small">Submitted items</div><div class="card-value">${bootstrap().orderItems.filter((item)=>item.status==='submitted').length}</div></div><div class="card"><div class="small">Pending sellers</div><div class="card-value">${pendingSellers.length}</div></div></div></section>${state.ui.flash ? `<div class="notice ${state.ui.flash.type==='error' ? 'bad' : 'good'}">${escapeHtml(state.ui.flash.text)}</div>` : ''}<div class="tabs">${['dashboard','orders','targets','payroll','payments','team','settings','policies'].map((tab)=>`<button class="${state.ui.tab===tab ? '' : 'secondary'}" onclick="state.ui.tab='${tab}';render()">${tab[0].toUpperCase()+tab.slice(1)}</button>`).join('')}</div>${state.ui.tab==='dashboard' ? renderDashboard(orders,pendingSellers) : ''}${state.ui.tab==='orders' ? renderOrders(selectedOrder,items,approvedSellers) : ''}${state.ui.tab==='targets' ? renderTargets() : ''}${state.ui.tab==='payroll' ? renderPayroll() : ''}${state.ui.tab==='payments' ? renderPayments() : ''}${state.ui.tab==='team' ? renderTeam() : ''}${state.ui.tab==='settings' ? renderSettings() : ''}${state.ui.tab==='policies' ? renderPolicies() : ''}`; }
    function render(){ if(state.token && state.bootstrap){ document.getElementById('auth').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); renderApp(); } else { document.getElementById('app').classList.add('hidden'); document.getElementById('auth').classList.remove('hidden'); renderAuth(); } }
    async function start(){ if(state.token){ try{ await refreshBootstrap(); } catch(_error){ setToken(''); state.bootstrap=null; } } render(); }
    start();
  </script>
</body>
