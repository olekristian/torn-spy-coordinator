<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spy Portal</title>
  <style>
    :root{--bg:#f4efe7;--panel:rgba(255,255,255,.86);--ink:#1f1b18;--muted:#675d55;--line:rgba(55,43,31,.12);--brand:#0e6a5a;--brand2:#d96f3e;--good:#1f8b4c;--warn:#ae6d12;--bad:#b03737;--shadow:0 22px 50px rgba(40,24,12,.12);--radius:18px}
    *{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,rgba(217,111,62,.18),transparent 28%),radial-gradient(circle at right,rgba(14,106,90,.18),transparent 30%),linear-gradient(180deg,#f6f0e8 0%,#efe7dc 100%);min-height:100vh}a{color:inherit}.shell{max-width:1280px;margin:0 auto;padding:20px 16px 48px}.hero,.panel,.card,.table-wrap,.auth-card{background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.hero{padding:22px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:clamp(1.8rem,4vw,3.3rem);line-height:1}.hero p,.muted{color:var(--muted)}.hero-grid,.grid,.stats,.form-grid,.two-col{display:grid;gap:14px}.hero-grid{grid-template-columns:2fr 1fr;align-items:start}.grid{grid-template-columns:repeat(12,minmax(0,1fr))}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px}.card,.panel{padding:16px}.stat-value{font-size:1.7rem;font-weight:700}.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:18px}.auth-card{width:min(980px,100%);padding:18px}.auth-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}button,input,textarea,select{font:inherit;width:100%;border-radius:14px;border:1px solid rgba(42,29,16,.16);padding:12px 13px;background:rgba(255,255,255,.9);color:var(--ink)}button{cursor:pointer;background:linear-gradient(135deg,var(--brand),#0b5649);color:#fff;border:0;font-weight:700}button.secondary{background:rgba(255,255,255,.76);color:var(--ink);border:1px solid var(--line)}button.warn{background:linear-gradient(135deg,#d37e2b,#b25e18)}button.bad{background:linear-gradient(135deg,#c94545,#9f2e2e)}button:disabled{opacity:.6;cursor:not-allowed}label{display:block;font-size:.92rem;font-weight:600;margin-bottom:6px}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-7{grid-column:span 7}.span-6{grid-column:span 6}.span-5{grid-column:span 5}.span-4{grid-column:span 4}.stack{display:grid;gap:10px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.row>*{flex:1 1 0}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(14,106,90,.1);color:var(--brand);font-size:.85rem;font-weight:700}.pill.good{background:rgba(31,139,76,.12);color:var(--good)}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);vertical-align:top}th{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.notice{padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.75);margin-bottom:12px}.notice.good{border-color:rgba(31,139,76,.24);background:rgba(31,139,76,.08)}.notice.bad{border-color:rgba(176,55,55,.24);background:rgba(176,55,55,.08)}.list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:16px;padding:14px;background:rgba(255,255,255,.66)}.item h3,.item h4,.panel h2{margin:0 0 8px}.kpi{font-size:.9rem;color:var(--muted)}.mono{font-family:Consolas,monospace}.small{font-size:.85rem;color:var(--muted)}.hidden{display:none!important}@media (max-width:920px){.hero-grid,.auth-grid,.two-col,.stats{grid-template-columns:1fr}.span-8,.span-7,.span-6,.span-5,.span-4{grid-column:span 12}table{min-width:0}th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}}
  </style>
</head>
<body>
  <div id="auth" class="auth-wrap"></div>
  <div id="app" class="shell hidden"></div>
  <script>
    const STORAGE_KEY="spyPortalV2",SESSION_KEY="spyPortalSession",PAYMENT_STATUSES=["unpaid","partially_paid","paid","refunded","waived"];
    const state=loadState();
    let view={tab:"dashboard",selectedOrderId:null,flash:null};
    function uid(p){return p+"_"+Math.random().toString(36).slice(2,10)}
    function now(){return new Date().toISOString()}
    function loadState(){const saved=localStorage.getItem(STORAGE_KEY);if(saved){try{return JSON.parse(saved)}catch(_){}}const serviceFirmId=uid("firm"),adminId=uid("user"),coordId=uid("user"),clientFirmId=uid("firm"),requesterId=uid("user"),orderId=uid("order");return{firms:[{id:serviceFirmId,name:"Bring Em Closer",type:"service",discordWebhook:"",createdAt:now()},{id:clientFirmId,name:"Helsing Legal",type:"client",discordWebhook:"",createdAt:now()}],users:[{id:adminId,name:"Portal Admin",email:"admin@spyportal.local",password:"admin123",createdAt:now()},{id:coordId,name:"Case Coordinator",email:"coord@spyportal.local",password:"coord123",createdAt:now()},{id:requesterId,name:"Client Contact",email:"client@helsing.local",password:"client123",createdAt:now()}],memberships:[{id:uid("mem"),userId:adminId,firmId:serviceFirmId,role:"super_admin",status:"active"},{id:uid("mem"),userId:coordId,firmId:serviceFirmId,role:"coordinator",status:"active"},{id:uid("mem"),userId:requesterId,firmId:clientFirmId,role:"lawfirm_admin",status:"active"}],sellerProfiles:[],orders:[{id:orderId,clientFirmId,requestedByUserId:requesterId,createdByUserId:coordId,title:"Opening order",dueDate:"",agreedPrice:0,notes:"Demo order for the new portal.",status:"open",paymentStatus:"unpaid",completedAt:"",notificationSentAt:"",createdAt:now()}],orderItems:[{id:uid("item"),orderId,targetName:"TargetOne",targetId:"1111111",notes:"",status:"open",claimedByUserId:"",completedByUserId:"",submittedByUserId:"",payoutStatus:"unpaid",payoutAmount:3500000,createdAt:now(),completedAt:""},{id:uid("item"),orderId,targetName:"TargetTwo",targetId:"2222222",notes:"",status:"open",claimedByUserId:"",completedByUserId:"",submittedByUserId:"",payoutStatus:"unpaid",payoutAmount:3500000,createdAt:now(),completedAt:""}],submissions:[],payments:[],payouts:[],notifications:[],apiConsents:[]}}
    function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
    function sessionUserId(){return localStorage.getItem(SESSION_KEY)||""}
    function setSession(id){if(id)localStorage.setItem(SESSION_KEY,id);else localStorage.removeItem(SESSION_KEY)}
    function me(){return state.users.find(u=>u.id===sessionUserId())||null}
    function membershipsFor(userId){return state.memberships.filter(m=>m.userId===userId&&m.status==="active")}
    function primaryMembership(userId){return membershipsFor(userId)[0]||null}
    function roleFor(userId){const m=primaryMembership(userId);return m?m.role:""}
    function firmForUser(userId){const m=primaryMembership(userId);return m?state.firms.find(f=>f.id===m.firmId)||null:null}
    function sellerProfile(userId){return state.sellerProfiles.find(p=>p.userId===userId)||null}
    function currentRole(){const user=me();return user?roleFor(user.id):""}
    function isAdmin(){return["super_admin","lawfirm_admin","coordinator"].includes(currentRole())}
    function canClaim(userId=sessionUserId()){const role=roleFor(userId);if(["super_admin","coordinator"].includes(role))return true;if(role!=="spy_seller")return false;const profile=sellerProfile(userId);return !!profile&&profile.status==="approved"}
    function userName(userId){const user=state.users.find(u=>u.id===userId);return user?user.name:"Unknown"}
    function firmName(firmId){const firm=state.firms.find(f=>f.id===firmId);return firm?firm.name:"Unknown"}
    function setFlash(type,text){view.flash={type,text};render()}
    function html(strings,...values){return strings.reduce((out,part,i)=>out+part+(values[i]??""),"")}
    function escapeHtml(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function normalizeTargetName(name){return String(name||"").replace(/\s*\[[0-9]+\]\s*$/,'').replace(/\s*\([0-9]+\)\s*$/,'').replace(/\s+'s Profile$/i,'').replace(/\s+lvl\s+\d+.*$/i,'').trim()}
    function parseSpyText(text){const source=String(text||""),nameMatch=source.match(/Name:\s*([^\r\n]+)/i);const stat=label=>{const m=source.match(new RegExp(label+":\\s*([0-9,]+|N\\/A)","i"));return m?m[1]:""};return{parsedName:normalizeTargetName(nameMatch?nameMatch[1]:""),stats:{strength:stat("Strength"),speed:stat("Speed"),dexterity:stat("Dexterity"),defense:stat("Defense"),total:stat("Total battle stats")}}}
    function parseTargets(text){const seen=new Set(),results=[],lines=String(text||"").split(/\r?\n/);for(let i=0;i<lines.length;i+=1){const line=lines[i].trim();if(!line)continue;let name="",id="";const bracket=line.match(/^(.+?)\s*[\[(]([0-9]{3,})[\])]/),same=line.match(/(.+?)https?:\/\/www\.torn\.com\/profiles\.php\?XID=([0-9]{3,})/i),url=line.match(/profiles\.php\?XID=([0-9]{3,})/i);if(bracket){name=normalizeTargetName(bracket[1]);id=bracket[2]}else if(same){name=normalizeTargetName(same[1]);id=same[2]}else if(url&&i>0){name=normalizeTargetName(lines[i-1]);id=url[1]}else{const cols=line.split(/\t|,|\|/).map(p=>p.trim()).filter(Boolean);if(cols.length){name=normalizeTargetName(cols[0]);id=(cols[1]||"").replace(/\D/g,'')}}if(!name)continue;const key=(id||"")+"::"+name.toLowerCase();if(seen.has(key))continue;seen.add(key);results.push({name,id,notes:""})}return results}
    function accessibleOrders(){const user=me();if(!user)return[];const role=currentRole(),firm=firmForUser(user.id);if(["super_admin","coordinator","spy_seller"].includes(role))return state.orders;return state.orders.filter(order=>order.clientFirmId===(firm&&firm.id))}
    function itemsForOrder(orderId){return state.orderItems.filter(item=>item.orderId===orderId)}
    function orderProgress(orderId){const items=itemsForOrder(orderId);return items.length?Math.round(items.filter(item=>item.status==="submitted").length/items.length*100):0}
    function updateOrderCompletion(orderId){const order=state.orders.find(o=>o.id===orderId);if(!order)return;const items=itemsForOrder(orderId),allDone=items.length>0&&items.every(item=>item.status==="submitted");order.status=allDone?"completed":items.some(item=>item.status==="claimed")?"in_progress":"open";order.completedAt=allDone?(order.completedAt||now()):"";if(allDone&&!order.notificationSentAt)sendCompletionNotification(order)}
    async function sendCompletionNotification(order){const firm=state.firms.find(f=>f.id===order.clientFirmId),note={id:uid("note"),type:"order_completed",orderId:order.id,target:firm?firm.name:"",status:"created",createdAt:now(),message:"All spies completed for "+order.title};state.notifications.unshift(note);order.notificationSentAt=now();if(firm&&firm.discordWebhook){try{await fetch(firm.discordWebhook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:"Order completed: "+order.title+" for "+firm.name})});note.status="discord_sent"}catch(_){note.status="discord_failed"}}saveState()}
    function registerSeller(form){const email=form.email.trim().toLowerCase();if(state.users.some(u=>u.email.toLowerCase()===email))throw new Error("Email already exists.");const serviceFirm=state.firms.find(f=>f.type==="service"),userId=uid("user");state.users.push({id:userId,name:form.name.trim(),email,password:form.password,createdAt:now()});state.memberships.push({id:uid("mem"),userId,firmId:serviceFirm.id,role:"spy_seller",status:"active"});state.sellerProfiles.push({id:uid("seller"),userId,status:"pending",manualCapable:true,apiConnected:false,payoutHandle:form.payoutHandle.trim(),notes:form.notes.trim(),rateCard:form.rateCard.trim(),specialties:form.specialties.trim(),createdAt:now()});saveState()}
    function registerClient(form){const email=form.email.trim().toLowerCase();if(state.users.some(u=>u.email.toLowerCase()===email))throw new Error("Email already exists.");const firmId=uid("firm"),userId=uid("user");state.firms.push({id:firmId,name:form.firmName.trim(),type:"client",discordWebhook:"",createdAt:now()});state.users.push({id:userId,name:form.name.trim(),email,password:form.password,createdAt:now()});state.memberships.push({id:uid("mem"),userId,firmId,role:"lawfirm_admin",status:"active"});saveState()}
    function login(email,password){const user=state.users.find(u=>u.email.toLowerCase()===email.trim().toLowerCase()&&u.password===password);if(!user)throw new Error("Invalid email or password.");setSession(user.id)}
    function createOrder(payload){const user=me(),targets=parseTargets(payload.targets);if(!targets.length)throw new Error("No valid targets detected.");const orderId=uid("order"),clientFirmId=payload.clientFirmId||(firmForUser(user.id)||{}).id;state.orders.unshift({id:orderId,clientFirmId,requestedByUserId:payload.requestedByUserId||user.id,createdByUserId:user.id,title:payload.title.trim(),dueDate:payload.dueDate,agreedPrice:Number(payload.agreedPrice||0),notes:payload.notes.trim(),status:"open",paymentStatus:"unpaid",completedAt:"",notificationSentAt:"",createdAt:now()});targets.forEach(target=>state.orderItems.push({id:uid("item"),orderId,targetName:target.name,targetId:target.id,notes:target.notes,status:"open",claimedByUserId:"",completedByUserId:"",submittedByUserId:"",payoutStatus:"unpaid",payoutAmount:Number(payload.defaultPayout||0),createdAt:now(),completedAt:""}));saveState();view.selectedOrderId=orderId}
    function claimItem(itemId){const item=state.orderItems.find(i=>i.id===itemId);if(!item)throw new Error("Item not found.");if(!canClaim())throw new Error("Only approved sellers or coordinators can claim targets.");item.claimedByUserId=sessionUserId();item.status="claimed";saveState();updateOrderCompletion(item.orderId);saveState()}
    function unclaimItem(itemId){const item=state.orderItems.find(i=>i.id===itemId);if(!item)return;const userId=sessionUserId();if(item.claimedByUserId!==userId&&!isAdmin())throw new Error("Only the claimer or an admin can unclaim.");item.claimedByUserId="";item.status="open";saveState();updateOrderCompletion(item.orderId);saveState()}
    function submitItem(payload){const item=state.orderItems.find(i=>i.id===payload.itemId);if(!item)throw new Error("Item not found.");const parsed=parseSpyText(payload.rawSpy),expected=normalizeTargetName(item.targetName);if(parsed.parsedName&&parsed.parsedName.toLowerCase()!==expected.toLowerCase())throw new Error("Parsed target name "+parsed.parsedName+" does not match task "+item.targetName+".");const completedByUserId=payload.completedByUserId||sessionUserId(),seller=sellerProfile(completedByUserId);if(roleFor(completedByUserId)==="spy_seller"&&(!seller||seller.status!=="approved"))throw new Error("Completed by must be an approved seller.");item.status="submitted";item.completedByUserId=completedByUserId;item.submittedByUserId=sessionUserId();item.completedAt=now();state.submissions.unshift({id:uid("sub"),itemId:item.id,rawSpy:payload.rawSpy.trim(),parsedName:parsed.parsedName||expected,stats:parsed.stats,createdByUserId:sessionUserId(),completedByUserId,createdAt:now()});state.payouts.push({id:uid("payout"),itemId:item.id,userId:completedByUserId,amount:Number(payload.payoutAmount||item.payoutAmount||0),status:payload.payoutStatus||"queued",notes:payload.payoutNotes.trim(),createdAt:now()});updateOrderCompletion(item.orderId);saveState()}
    function updateSellerStatus(userId,status){const profile=sellerProfile(userId);if(!profile)throw new Error("Seller profile not found.");profile.status=status;saveState()}
    function revokeApi(){state.apiConsents.forEach(entry=>{if(entry.userId===sessionUserId()&&entry.status==="active"){entry.status="revoked";entry.revokedAt=now()}});const profile=sellerProfile(sessionUserId());if(profile)profile.apiConnected=false;saveState()}
    function switchTab(tab){view.tab=tab;render()}
    function openOrder(orderId){view.selectedOrderId=orderId;view.tab="orders";render()}
    function logout(){setSession("");view={tab:"dashboard",selectedOrderId:null,flash:null};render()}
    function safeAction(fn,successMessage){try{const result=fn();if(result&&typeof result.then==="function"){result.then(()=>setFlash("ok",successMessage)).catch(error=>setFlash("error",error.message));return}setFlash("ok",successMessage)}catch(error){setFlash("error",error.message)}}
    function statusClass(type){return type==="error"?"bad":"good"}
    function renderAuth(){document.getElementById("auth").innerHTML=html`
      <div class="auth-card"><div class="auth-grid"><section class="hero"><span class="pill">Multi-firm portal</span><h1>Spy sellers, orders, payroll and completion tracking in one place.</h1><p>This MVP runs locally in the browser. Login, seller approval, manual submissions, payouts, payments, tenant separation and API consent are implemented here. Torn log automation still needs a real backend.</p><div class="stats"><div class="card"><div class="kpi">Seed admin</div><div class="stat-value">admin@spyportal.local</div><div class="small">password: admin123</div></div><div class="card"><div class="kpi">Seed coordinator</div><div class="stat-value">coord@spyportal.local</div><div class="small">password: coord123</div></div><div class="card"><div class="kpi">Seed client</div><div class="stat-value">client@helsing.local</div><div class="small">password: client123</div></div><div class="card"><div class="kpi">Manual-first</div><div class="stat-value">API key optional</div><div class="small">needed only for later automation</div></div></div></section><section class="stack"><div class="panel"><h2>Login</h2><div class="small" style="margin-bottom:10px">Need the current operational board instead? Open <a href="./index.html">index.html</a>.</div><div class="stack"><div><label>Email</label><input id="login-email" type="email" value="admin@spyportal.local"></div><div><label>Password</label><input id="login-password" type="password" value="admin123"></div><button onclick="onLogin()">Login</button></div></div><div class="two-col"><div class="panel"><h2>Register seller</h2><div class="stack"><input id="seller-name" placeholder="Display name"><input id="seller-email" type="email" placeholder="Email"><input id="seller-password" type="password" placeholder="Password"><input id="seller-payout" placeholder="Payout handle or wallet"><input id="seller-rate" placeholder="Rate card e.g. 3.5m per spy"><textarea id="seller-notes" rows="3" placeholder="Specialties or notes"></textarea><button class="secondary" onclick="onRegisterSeller()">Create seller account</button></div></div><div class="panel"><h2>Register law firm</h2><div class="stack"><input id="client-firm" placeholder="Law firm name"><input id="client-name" placeholder="Contact name"><input id="client-email" type="email" placeholder="Email"><input id="client-password" type="password" placeholder="Password"><button class="secondary" onclick="onRegisterClient()">Create law firm account</button></div></div></div></section></div></div>`}
    function renderApp(){const user=me(),role=currentRole(),orders=accessibleOrders(),selectedOrder=state.orders.find(order=>order.id===(view.selectedOrderId||(orders[0]&&orders[0].id)))||null;if(!view.selectedOrderId&&selectedOrder)view.selectedOrderId=selectedOrder.id;const items=selectedOrder?itemsForOrder(selectedOrder.id):[],pendingSellers=state.sellerProfiles.filter(p=>p.status==="pending"),approvedSellers=state.sellerProfiles.filter(p=>p.status==="approved"),myFirm=firmForUser(user.id),app=document.getElementById("app");app.innerHTML=html`
      <section class="hero"><div class="hero-grid"><div><span class="pill">${escapeHtml(role.replace(/_/g," "))}</span><h1>${escapeHtml(myFirm?myFirm.name:"Spy Portal")}</h1><p>${escapeHtml(user.name)} is signed in. Sellers can submit manually without API keys. API keys are only connected later for automation consent and future log matching.</p></div><div class="stack"><div class="card"><div class="kpi">Orders visible</div><div class="stat-value">${orders.length}</div></div><div class="row"><button class="secondary" onclick="window.location.href='./index.html'">Legacy board</button><button class="secondary" onclick="view.tab='policies';render()">Policies</button><button class="bad" onclick="logout()">Logout</button></div></div></div><div class="stats"><div class="card"><div class="kpi">Open items</div><div class="stat-value">${state.orderItems.filter(item=>item.status==="open").length}</div></div><div class="card"><div class="kpi">Claimed items</div><div class="stat-value">${state.orderItems.filter(item=>item.status==="claimed").length}</div></div><div class="card"><div class="kpi">Submitted items</div><div class="stat-value">${state.orderItems.filter(item=>item.status==="submitted").length}</div></div><div class="card"><div class="kpi">Pending sellers</div><div class="stat-value">${pendingSellers.length}</div></div></div></section>
      ${view.flash?`<div class="notice ${statusClass(view.flash.type)}">${escapeHtml(view.flash.text)}</div>`:""}
      <div class="tabs">${["dashboard","orders","targets","payroll","payments","team","settings","policies"].map(tab=>`<button class="${view.tab===tab?"":"secondary"}" onclick="switchTab('${tab}')">${tab[0].toUpperCase()+tab.slice(1)}</button>`).join("")}</div>
      ${view.tab==="dashboard"?renderDashboard(orders,pendingSellers):""}
      ${view.tab==="orders"?renderOrders(selectedOrder,items,approvedSellers):""}
      ${view.tab==="targets"?renderTargets():""}
      ${view.tab==="payroll"?renderPayroll():""}
      ${view.tab==="payments"?renderPayments():""}
      ${view.tab==="team"?renderTeam():""}
      ${view.tab==="settings"?renderSettings():""}
      ${view.tab==="policies"?renderPolicies():""}`}
    function renderDashboard(orders,pendingSellers){return html`<section class="grid"><div class="span-8 panel"><h2>Recent orders</h2><div class="list">${orders.slice(0,6).map(order=>`<div class="item"><div class="row"><div><h3>${escapeHtml(order.title)}</h3><div class="small">${escapeHtml(firmName(order.clientFirmId))} � ${escapeHtml(order.status)} � ${orderProgress(order.id)}% complete</div></div><button class="secondary" onclick="openOrder('${order.id}')">Open</button></div></div>`).join("")||"<div class='small'>No orders available.</div>"}</div></div><div class="span-4 stack"><div class="panel"><h2>Seller queue</h2><div class="small">${pendingSellers.length} seller accounts are waiting for approval.</div></div><div class="panel"><h2>Notifications</h2><div class="list">${state.notifications.slice(0,5).map(note=>`<div class="item"><strong>${escapeHtml(note.message)}</strong><div class="small">${escapeHtml(note.status)} � ${new Date(note.createdAt).toLocaleString()}</div></div>`).join("")||"<div class='small'>No notifications yet.</div>"}</div></div></div></section>`}
    function renderOrders(selectedOrder,items,approvedSellers){const user=me(),canCreate=["super_admin","coordinator","lawfirm_admin","client_requester"].includes(currentRole()),clientFirmOptions=state.firms.filter(firm=>firm.type==="client");return html`<section class="grid"><div class="span-4 stack">${canCreate?`<div class="panel"><h2>Create order</h2><div class="stack"><input id="order-title" placeholder="Order title"><select id="order-client">${clientFirmOptions.map(firm=>`<option value="${firm.id}" ${firm.id===((firmForUser(user.id)||{}).id)?"selected":""}>${escapeHtml(firm.name)}</option>`).join("")}</select><div class="row"><input id="order-due" type="date"><input id="order-price" type="number" min="0" step="1" placeholder="Total price"></div><input id="item-payout" type="number" min="0" step="1" placeholder="Default payout per spy"><textarea id="order-notes" rows="3" placeholder="Notes"></textarea><textarea id="order-targets" rows="8" placeholder="Paste targets here. Supports Name [ID], Name (ID), profile URL lines and delimiter-based lists."></textarea><button onclick="onCreateOrder()">Create order</button></div></div>`:""}<div class="panel"><h2>Orders</h2><div class="list">${accessibleOrders().map(order=>`<div class="item"><div class="row"><div><h4>${escapeHtml(order.title)}</h4><div class="small">${escapeHtml(firmName(order.clientFirmId))} � ${orderProgress(order.id)}% � ${escapeHtml(order.paymentStatus)}</div></div><button class="secondary" onclick="openOrder('${order.id}')">Open</button></div></div>`).join("")}</div></div></div><div class="span-8 stack">${selectedOrder?`<div class="panel"><div class="row"><div><h2>${escapeHtml(selectedOrder.title)}</h2><div class="small">${escapeHtml(firmName(selectedOrder.clientFirmId))} � ${escapeHtml(selectedOrder.status)} � ${orderProgress(selectedOrder.id)}% complete</div></div><span class="pill">${escapeHtml(selectedOrder.paymentStatus)}</span></div><p class="muted">${escapeHtml(selectedOrder.notes||"No notes.")}</p><div class="list">${items.map(item=>`<div class="item"><div class="row"><div><h4>${escapeHtml(item.targetName)} ${item.targetId?`<span class="small mono">[${escapeHtml(item.targetId)}]</span>`:""}</h4><div class="small">${escapeHtml(item.status)} � Claimed by ${escapeHtml(item.claimedByUserId?userName(item.claimedByUserId):"nobody")} � Completed by ${escapeHtml(item.completedByUserId?userName(item.completedByUserId):"-")}</div></div>${item.status==="open"?`<button onclick="safeAction(() => claimItem('${item.id}'),'Target claimed.')">Claim</button>`:""}${item.status==="claimed"?`<button class="secondary" onclick="safeAction(() => unclaimItem('${item.id}'),'Target unclaimed.')">Unclaim</button>`:""}</div>${(item.status==="claimed"||(isAdmin()&&item.status!=="submitted"))?`<div class="stack" style="margin-top:10px"><textarea id="spy-${item.id}" rows="5" placeholder="Paste raw spy text"></textarea><div class="row"><select id="done-by-${item.id}"><option value="${sessionUserId()}">Completed by me</option>${approvedSellers.map(profile=>`<option value="${profile.userId}">${escapeHtml(userName(profile.userId))}</option>`).join("")}</select><input id="payout-${item.id}" type="number" min="0" step="1" value="${escapeHtml(item.payoutAmount||0)}"></div><input id="payout-note-${item.id}" placeholder="Payout note"><button class="warn" onclick="onSubmitItem('${item.id}')">Submit spy</button></div>`:""}</div>`).join("")||"<div class='small'>This order has no items.</div>"}</div></div>`:`<div class="panel"><div class="small">Select an order to continue.</div></div>`}</div></section>`}
    function renderTargets(){const items=state.orderItems.filter(item=>accessibleOrders().some(order=>order.id===item.orderId));return html`<div class="table-wrap panel"><h2>Targets board</h2><table><thead><tr><th>Target</th><th>Order</th><th>Status</th><th>Claimed By</th><th>Completed By</th><th>Action</th></tr></thead><tbody>${items.map(item=>`<tr><td>${escapeHtml(item.targetName)} ${item.targetId?`<span class="small mono">[${escapeHtml(item.targetId)}]</span>`:""}</td><td>${escapeHtml((state.orders.find(order=>order.id===item.orderId)||{}).title||"")}</td><td>${escapeHtml(item.status)}</td><td>${escapeHtml(item.claimedByUserId?userName(item.claimedByUserId):"-")}</td><td>${escapeHtml(item.completedByUserId?userName(item.completedByUserId):"-")}</td><td>${item.status==="open"?`<button onclick="safeAction(() => claimItem('${item.id}'),'Target claimed.')">Claim</button>`:item.status==="claimed"?`<button class="secondary" onclick="safeAction(() => unclaimItem('${item.id}'),'Target unclaimed.')">Unclaim</button>`:`<span class="pill good">Done</span>`}</td></tr>`).join("")}</tbody></table></div>`}
    function renderPayroll(){const payouts=state.payouts.filter(payout=>["super_admin","coordinator"].includes(currentRole())||payout.userId===sessionUserId());return html`<div class="table-wrap panel"><h2>Payroll</h2><table><thead><tr><th>Seller</th><th>Amount</th><th>Status</th><th>Item</th><th>Notes</th></tr></thead><tbody>${payouts.map(payout=>{const item=state.orderItems.find(entry=>entry.id===payout.itemId)||{};return`<tr><td>${escapeHtml(userName(payout.userId))}</td><td>${Number(payout.amount||0).toLocaleString()}</td><td>${escapeHtml(payout.status)}</td><td>${escapeHtml(item.targetName||"")}</td><td>${escapeHtml(payout.notes||"")}</td></tr>`}).join("")||"<tr><td colspan='5'>No payouts yet.</td></tr>"}</tbody></table></div>`}
    function renderPayments(){const orders=accessibleOrders();return html`<section class="grid"><div class="span-5 panel"><h2>Register payment</h2><div class="stack"><select id="payment-order">${orders.map(order=>`<option value="${order.id}">${escapeHtml(order.title)}</option>`).join("")}</select><input id="payment-amount" type="number" min="0" step="1" placeholder="Amount"><select id="payment-status">${PAYMENT_STATUSES.map(status=>`<option value="${status}">${status}</option>`).join("")}</select><textarea id="payment-note" rows="3" placeholder="Payment note"></textarea><button onclick="onAddPayment()">Save payment</button></div></div><div class="span-7 table-wrap panel"><h2>Payments</h2><table><thead><tr><th>Order</th><th>Amount</th><th>Status</th><th>Recorded By</th><th>Created</th></tr></thead><tbody>${state.payments.filter(payment=>accessibleOrders().some(order=>order.id===payment.orderId)).map(payment=>`<tr><td>${escapeHtml((state.orders.find(order=>order.id===payment.orderId)||{}).title||"")}</td><td>${Number(payment.amount||0).toLocaleString()}</td><td>${escapeHtml(payment.status)}</td><td>${escapeHtml(userName(payment.createdByUserId))}</td><td>${new Date(payment.createdAt).toLocaleString()}</td></tr>`).join("")||"<tr><td colspan='5'>No payments recorded.</td></tr>"}</tbody></table></div></section>`}
    function renderTeam(){return html`<section class="grid"><div class="span-5 panel"><h2>Seller approval queue</h2><div class="list">${state.sellerProfiles.map(profile=>`<div class="item"><h4>${escapeHtml(userName(profile.userId))}</h4><div class="small">${escapeHtml(profile.status)} � manual ${profile.manualCapable?"enabled":"disabled"} � API ${profile.apiConnected?"connected":"not connected"}</div><div class="small">${escapeHtml(profile.rateCard||"No rate card")} � ${escapeHtml(profile.payoutHandle||"No payout handle")}</div>${isAdmin()?`<div class="row" style="margin-top:8px"><button onclick="safeAction(() => updateSellerStatus('${profile.userId}','approved'),'Seller approved.')">Approve</button><button class="warn" onclick="safeAction(() => updateSellerStatus('${profile.userId}','suspended'),'Seller suspended.')">Suspend</button><button class="bad" onclick="safeAction(() => updateSellerStatus('${profile.userId}','rejected'),'Seller rejected.')">Reject</button></div>`:""}</div>`).join("")||"<div class='small'>No sellers registered.</div>"}</div></div><div class="span-7 table-wrap panel"><h2>Users and memberships</h2><table><thead><tr><th>Name</th><th>Email</th><th>Firm</th><th>Role</th><th>Status</th></tr></thead><tbody>${state.memberships.map(membership=>`<tr><td>${escapeHtml(userName(membership.userId))}</td><td>${escapeHtml((state.users.find(user=>user.id===membership.userId)||{}).email||"")}</td><td>${escapeHtml(firmName(membership.firmId))}</td><td>${escapeHtml(membership.role)}</td><td>${escapeHtml(membership.status)}</td></tr>`).join("")}</tbody></table></div></section>`}
    function renderSettings(){const firm=firmForUser(sessionUserId())||{},consent=state.apiConsents.find(entry=>entry.userId===sessionUserId()&&entry.status==="active");return html`<section class="grid"><div class="span-6 panel"><h2>API key consent</h2><p class="muted">Manual submission is always available. Connect an API key only if you want future log-based suggestions when a real backend exists.</p><div class="stack"><input id="api-scope" placeholder="Requested scope e.g. user/log custom key"><input id="api-key" placeholder="API key or placeholder"><textarea id="api-note" rows="3" placeholder="Consent note"></textarea><div class="row"><button onclick="onConnectApi()">${consent?"Update consent":"Save consent"}</button>${consent?`<button class="bad" onclick="safeAction(() => revokeApi(),'API consent revoked.')">Revoke</button>`:""}</div><div class="small">${consent?"Connected: "+escapeHtml(consent.maskedKey)+" � "+escapeHtml(consent.scope):"No active API key consent."}</div></div></div><div class="span-6 panel"><h2>Firm integration</h2><div class="stack"><input id="firm-name" value="${escapeHtml(firm.name||"")}" placeholder="Firm name"><input id="firm-webhook" value="${escapeHtml(firm.discordWebhook||"")}" placeholder="Discord webhook URL"><button onclick="onSaveFirmSettings()">Save firm settings</button><div class="small">Discord is treated as a notification channel only. Orders and payroll still live in this portal.</div></div></div></section>`}
    function renderPolicies(){return html`<section class="grid"><div class="span-6 panel"><h2>Privacy Policy</h2><p class="muted">This portal stores account identity, firm memberships, orders, targets, submissions, customer payments, staff payouts, notification logs and optional API consent details. API keys are optional and only intended for future automation with explicit consent. Users must be able to revoke keys and request data removal in a production deployment.</p></div><div class="span-6 panel"><h2>API Usage Policy</h2><p class="muted">Use documented Torn API capabilities only. Do not scrape Torn pages for automation. Request the narrowest custom key scope possible, state what is collected, why it is collected and how long it is retained. Manual spy submission remains available without API key access.</p></div></section>`}
    function onLogin(){safeAction(()=>login(document.getElementById("login-email").value,document.getElementById("login-password").value),"Logged in.")}
    function onRegisterSeller(){safeAction(()=>registerSeller({name:document.getElementById("seller-name").value,email:document.getElementById("seller-email").value,password:document.getElementById("seller-password").value,payoutHandle:document.getElementById("seller-payout").value,rateCard:document.getElementById("seller-rate").value,specialties:"",notes:document.getElementById("seller-notes").value}),"Seller account created. Await admin approval.")}
    function onRegisterClient(){safeAction(()=>registerClient({firmName:document.getElementById("client-firm").value,name:document.getElementById("client-name").value,email:document.getElementById("client-email").value,password:document.getElementById("client-password").value}),"Law firm account created.")}
    function onCreateOrder(){safeAction(()=>createOrder({title:document.getElementById("order-title").value,clientFirmId:document.getElementById("order-client").value,dueDate:document.getElementById("order-due").value,agreedPrice:document.getElementById("order-price").value,defaultPayout:document.getElementById("item-payout").value,notes:document.getElementById("order-notes").value,targets:document.getElementById("order-targets").value}),"Order created.")}
    function onSubmitItem(itemId){safeAction(()=>submitItem({itemId,rawSpy:document.getElementById("spy-"+itemId).value,completedByUserId:document.getElementById("done-by-"+itemId).value,payoutAmount:document.getElementById("payout-"+itemId).value,payoutStatus:"queued",payoutNotes:document.getElementById("payout-note-"+itemId).value}),"Spy submitted.")}
    function onAddPayment(){safeAction(()=>{const orderId=document.getElementById("payment-order").value,status=document.getElementById("payment-status").value;state.payments.unshift({id:uid("pay"),orderId,amount:Number(document.getElementById("payment-amount").value||0),status,note:document.getElementById("payment-note").value.trim(),createdByUserId:sessionUserId(),createdAt:now()});const order=state.orders.find(entry=>entry.id===orderId);if(order)order.paymentStatus=status;saveState()},"Payment recorded.")}
    function onConnectApi(){safeAction(()=>{const key=document.getElementById("api-key").value.trim(),scope=document.getElementById("api-scope").value.trim();if(!key)throw new Error("API key is required to store consent.");state.apiConsents.forEach(entry=>{if(entry.userId===sessionUserId()&&entry.status==="active")entry.status="replaced"});state.apiConsents.unshift({id:uid("consent"),userId:sessionUserId(),maskedKey:key.slice(0,4)+"..."+key.slice(-3),scope,note:document.getElementById("api-note").value.trim(),status:"active",consentedAt:now()});const profile=sellerProfile(sessionUserId());if(profile)profile.apiConnected=true;saveState()},"API consent saved.")}
    function onSaveFirmSettings(){safeAction(()=>{const firm=firmForUser(sessionUserId());if(!firm)throw new Error("No firm found.");firm.name=document.getElementById("firm-name").value.trim()||firm.name;firm.discordWebhook=document.getElementById("firm-webhook").value.trim();saveState()},"Firm settings saved.")}
    function render(){if(me()){document.getElementById("auth").classList.add("hidden");document.getElementById("app").classList.remove("hidden");renderApp()}else{document.getElementById("app").classList.add("hidden");document.getElementById("auth").classList.remove("hidden");renderAuth()}}
    render();
  </script>
</body>
</html>
