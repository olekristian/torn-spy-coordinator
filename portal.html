    function sanitizeSpyText(raw){let text=String(raw||"").replace(/\u00A0/g," ").replace(/\r/g,"").trim();return text.split("\n").map(line=>line.replace(/^\s*>\s?/,"").replace(/^\s*(?:\d+\s*[:.)]|[-–•*])\s*/,"").replace(/\*\*/g,"").replace(/`/g,"")).join("\n")}
    function parseNumberToken(value){if(value==null)return null;const normalized=String(value).trim().toLowerCase().replace(/[, ]+/g,"");if(!normalized||/^(?:n\/a|na|unknown|\?)$/.test(normalized))return null;const short=normalized.match(/^(\d+(?:\.\d+)?)([kmbt])?$/i);if(short){const base=parseFloat(short[1]),multiplier={k:1e3,m:1e6,b:1e9,t:1e12}[short[2]?.toLowerCase()]||1;return Math.round(base*multiplier)}if(/^\d+$/.test(normalized))return parseInt(normalized,10);const parsed=Number(normalized);return Number.isFinite(parsed)?Math.round(parsed):null}

    function completeStats(stats){const normalized={strength:stats.strength==null?null:Math.round(Number(stats.strength)),speed:stats.speed==null?null:Math.round(Number(stats.speed)),dexterity:stats.dexterity==null?null:Math.round(Number(stats.dexterity)),defense:stats.defense==null?null:Math.round(Number(stats.defense)),total:stats.total==null?null:Math.round(Number(stats.total))},parts=[normalized.strength,normalized.speed,normalized.dexterity,normalized.defense],known=parts.filter(value=>value!=null).length;if(normalized.total==null&&known===4)normalized.total=parts[0]+parts[1]+parts[2]+parts[3];if(normalized.total!=null&&known===3){const missingIndex=parts.findIndex(value=>value==null),sumKnown=parts.reduce((sum,value)=>sum+(value||0),0),derived=Math.max(0,normalized.total-sumKnown);if(missingIndex===0)normalized.strength=derived;if(missingIndex===1)normalized.speed=derived;if(missingIndex===2)normalized.dexterity=derived;if(missingIndex===3)normalized.defense=derived}Object.assign(stats,normalized);return stats}

    function mergeSpyEntries(entries){const byKey=new Map(),pickNum=(left,right)=>{const a=left==null||isNaN(left)?null:Number(left),b=right==null||isNaN(right)?null:Number(right);if(a==null)return b;if(b==null)return a;return Math.max(a,b)};for(const entry of entries){const key=(entry.id||"").trim()?`id:${(entry.id||"").trim()}|lv:${entry.level!=null?String(entry.level):""}`:`name:${(entry.name||"").trim().toLowerCase()}|lv:${entry.level!=null?String(entry.level):""}`;if(!byKey.has(key)){byKey.set(key,{...entry});continue}const current=byKey.get(key);current.name=current.name||entry.name;current.id=current.id||entry.id;current.level=current.level!=null?current.level:entry.level;current.strength=pickNum(current.strength,entry.strength);current.speed=pickNum(current.speed,entry.speed);current.dexterity=pickNum(current.dexterity,entry.dexterity);current.defense=pickNum(current.defense,entry.defense);current.total=pickNum(current.total,entry.total)}return Array.from(byKey.values()).map(entry=>{completeStats(entry);const hasFour=[entry.strength,entry.speed,entry.dexterity,entry.defense].every(value=>value!=null);entry.total=hasFour?entry.strength+entry.speed+entry.dexterity+entry.defense:null;return entry})}
    function getMissingStats(stats){const missing=[];if(stats.strength==null)missing.push("Strength");if(stats.speed==null)missing.push("Speed");if(stats.dexterity==null)missing.push("Dexterity");if(stats.defense==null)missing.push("Defense");return missing}
    function analyzeSpyText(rawSpy,item){const blocks=extractSpyBlocks(rawSpy),parsedBlocks=blocks.map(parseSpyBlock),merged=mergeSpyEntries(parsedBlocks),hasParsedData=merged.some(entry=>entry.name||entry.id||entry.level!=null||[entry.strength,entry.speed,entry.dexterity,entry.defense,entry.total].some(value=>value!=null));if(!hasParsedData)throw new Error("No spy data could be parsed from the pasted text.");if(merged.length!==1)throw new Error("Multiple targets were detected in the pasted text. Submit one target per task.");const entry=merged[0],expectedName=normalizeTargetName(item.targetName||""),parsedName=normalizeTargetName(entry.name||"");if(item.targetId&&entry.id&&String(item.targetId)!==String(entry.id))throw new Error("Parsed target ID "+entry.id+" does not match task ID "+item.targetId+".");if(!item.targetId&&parsedName&&expectedName&&parsedName.toLowerCase()!==expectedName.toLowerCase())throw new Error("Parsed target name "+entry.name+" does not match task "+item.targetName+".");if(!entry.name&&item.targetName)entry.name=item.targetName;if(!entry.id&&item.targetId)entry.id=item.targetId;completeStats(entry);const hasFour=[entry.strength,entry.speed,entry.dexterity,entry.defense].every(value=>value!=null);entry.total=hasFour?entry.strength+entry.speed+entry.dexterity+entry.defense:null;return{parsedName:normalizeTargetName(entry.name||item.targetName||""),targetId:entry.id||item.targetId||"",level:entry.level,stats:{strength:entry.strength,speed:entry.speed,dexterity:entry.dexterity,defense:entry.defense,total:entry.total},missing:getMissingStats(entry)}}
    function parseTargets(text){const seen=new Set(),results=[],lines=String(text||"").split(/\r?\n/);for(let i=0;i<lines.length;i+=1){const line=lines[i].trim();if(!line)continue;let name="",id="";const bracket=line.match(/^(.+?)\s*[\[(]([0-9]{3,})[\])]/),same=line.match(/(.+?)https?:\/\/www\.torn\.com\/profiles\.php\?XID=([0-9]{3,})/i),url=line.match(/profiles\.php\?XID=([0-9]{3,})/i);if(bracket){name=normalizeTargetName(bracket[1]);id=bracket[2]}else if(same){name=normalizeTargetName(same[1]);id=same[2]}else if(url&&i>0){name=normalizeTargetName(lines[i-1]);id=url[1]}else{const cols=line.split(/\t|,|\|/).map(p=>p.trim()).filter(Boolean);if(cols.length){name=normalizeTargetName(cols[0]);id=(cols[1]||"").replace(/\D/g,'')}}if(!name)continue;const key=(id||"")+"::"+name.toLowerCase();if(seen.has(key))continue;seen.add(key);results.push({name,id,notes:""})}return results}

    function registerSeller(form){const email=form.email.trim().toLowerCase();if(state.users.some(u=>u.email.toLowerCase()===email))throw new Error("Email already exists.");const serviceFirm=state.firms.find(f=>f.type==="service"),userId=uid("user");state.users.push({id:userId,name:form.name.trim(),email,password:form.password,createdAt:now()});state.memberships.push({id:uid("mem"),userId,firmId:serviceFirm.id,role:"spy_seller",status:"active"});state.sellerProfiles.push({id:uid("seller"),userId,status:"pending",manualCapable:true,apiConnected:false,payoutHandle:form.payoutHandle.trim(),notes:form.notes.trim(),rateCard:form.rateCard.trim(),specialties:form.specialties.trim(),createdAt:now()});saveState()}

    function createMember(form){const currentUser=me(),currentFirm=firmForUser(currentUser.id);if(!currentFirm)throw new Error("No firm found.");if(!["super_admin","lawfirm_admin","coordinator"].includes(currentRole()))throw new Error("You do not have permission to add members.");const email=form.email.trim().toLowerCase();if(state.users.some(u=>u.email.toLowerCase()===email))throw new Error("Email already exists.");const userId=uid("user"),role=form.role;if(!ROLE_OPTIONS.includes(role))throw new Error("Invalid role.");state.users.push({id:userId,name:form.name.trim(),email,password:form.password,createdAt:now()});state.memberships.push({id:uid("mem"),userId,firmId:currentFirm.id,role,status:"active"});if(role==="spy_seller"){state.sellerProfiles.push({id:uid("seller"),userId,status:"approved",manualCapable:true,apiConnected:false,payoutHandle:form.payoutHandle.trim(),notes:form.notes.trim(),rateCard:form.rateCard.trim(),specialties:form.specialties.trim(),createdAt:now()})}saveState()}

    function acceptInvite(form){const invite=inviteByToken(form.token);if(!invite)throw new Error("Invite token not found.");if(invite.status!=="pending")throw new Error("Invite is not active.");if(new Date(invite.expiresAt).getTime()<Date.now()){invite.status="expired";saveState();throw new Error("Invite has expired.");}const email=invite.email.trim().toLowerCase();if(state.users.some(user=>user.email.toLowerCase()===email))throw new Error("An account with this email already exists.");const userId=uid("user");state.users.push({id:userId,name:form.name.trim(),email,password:form.password,createdAt:now()});state.memberships.push({id:uid("mem"),userId,firmId:invite.firmId,role:invite.role,status:"active"});if(invite.role==="spy_seller"){state.sellerProfiles.push({id:uid("seller"),userId,status:"approved",manualCapable:true,apiConnected:false,payoutHandle:form.payoutHandle.trim(),notes:form.notes.trim(),rateCard:form.rateCard.trim(),specialties:"",createdAt:now()})}invite.status="accepted";invite.acceptedByUserId=userId;invite.acceptedAt=now();saveState();setSession(userId)}
    function login(email,password){const user=state.users.find(u=>u.email.toLowerCase()===email.trim().toLowerCase()&&u.password===password);if(!user)throw new Error("Invalid email or password.");setSession(user.id)}
    function createOrder(payload){const user=me(),targets=parseTargets(payload.targets);if(!targets.length)throw new Error("No valid targets detected.");const orderId=uid("order"),clientFirmId=payload.clientFirmId||(firmForUser(user.id)||{}).id;state.orders.unshift({id:orderId,clientFirmId,requestedByUserId:payload.requestedByUserId||user.id,createdByUserId:user.id,title:payload.title.trim(),dueDate:payload.dueDate,agreedPrice:Number(payload.agreedPrice||0),notes:payload.notes.trim(),status:"open",paymentStatus:"unpaid",completedAt:"",notificationSentAt:"",createdAt:now()});targets.forEach(target=>state.orderItems.push({id:uid("item"),orderId,targetName:target.name,targetId:target.id,notes:target.notes,status:"open",claimedByUserId:"",completedByUserId:"",submittedByUserId:"",payoutStatus:"unpaid",payoutAmount:Number(payload.defaultPayout||0),createdAt:now(),completedAt:""}));saveState();view.selectedOrderId=orderId}
    function claimItem(itemId){const item=state.orderItems.find(i=>i.id===itemId);if(!item)throw new Error("Item not found.");if(!canClaim())throw new Error("Only approved sellers or coordinators can claim targets.");item.claimedByUserId=sessionUserId();item.status="claimed";saveState();updateOrderCompletion(item.orderId);saveState()}
    function unclaimItem(itemId){const item=state.orderItems.find(i=>i.id===itemId);if(!item)return;const userId=sessionUserId();if(item.claimedByUserId!==userId&&!isAdmin())throw new Error("Only the claimer or an admin can unclaim.");item.claimedByUserId="";item.status="open";saveState();updateOrderCompletion(item.orderId);saveState()}
    function submitItem(payload){const item=state.orderItems.find(i=>i.id===payload.itemId);if(!item)throw new Error("Item not found.");const analysis=analyzeSpyText(payload.rawSpy,item),completedByUserId=payload.completedByUserId||sessionUserId(),seller=sellerProfile(completedByUserId);if(roleFor(completedByUserId)==="spy_seller"&&(!seller||seller.status!=="approved"))throw new Error("Completed by must be an approved seller.");if(analysis.missing.length&&!payload.allowPartial)throw new Error("Partial spy detected. Missing: "+analysis.missing.join(", ")+".");item.status="submitted";item.completedByUserId=completedByUserId;item.submittedByUserId=sessionUserId();item.completedAt=now();state.submissions.unshift({id:uid("sub"),itemId:item.id,rawSpy:payload.rawSpy.trim(),parsedName:analysis.parsedName||normalizeTargetName(item.targetName),targetId:analysis.targetId,level:analysis.level,stats:analysis.stats,missingStats:analysis.missing,createdByUserId:sessionUserId(),completedByUserId,createdAt:now()});state.payouts.push({id:uid("payout"),itemId:item.id,userId:completedByUserId,amount:Number(payload.payoutAmount||item.payoutAmount||0),status:payload.payoutStatus||"queued",notes:payload.payoutNotes.trim(),createdAt:now()});updateOrderCompletion(item.orderId);saveState()}
    function onSpyInput(itemId){const item=state.orderItems.find(entry=>entry.id===itemId),target=document.getElementById("spy-warning-"+itemId),source=document.getElementById("spy-"+itemId);if(!item||!target||!source)return;const raw=source.value||"";if(!raw.trim()){target.textContent="";target.className="small";return}try{const analysis=analyzeSpyText(raw,item);if(analysis.missing.length){target.textContent="Warning: partial spy. Missing "+analysis.missing.join(", ")+". You can still submit.";target.className="small warn-text";return}target.textContent="Full spy detected.";target.className="small good-text"}catch(error){target.textContent=String(error.message||error);target.className="small warn-text"}}
    function updateSellerStatus(userId,status){const profile=sellerProfile(userId);if(!profile)throw new Error("Seller profile not found.");profile.status=status;saveState()}
    function updatePayoutStatus(payoutId,status){if(!PAYOUT_STATUSES.includes(status))throw new Error("Invalid payout status.");const payout=state.payouts.find(entry=>entry.id===payoutId);if(!payout)throw new Error("Payout not found.");payout.status=status;payout.updatedAt=now();saveState()}
    function updateOrderStatus(orderId,status){if(!ORDER_STATUSES.includes(status))throw new Error("Invalid order status.");const order=state.orders.find(entry=>entry.id===orderId);if(!order)throw new Error("Order not found.");order.status=status;if(status==="cancelled"){order.completedAt="";order.notificationSentAt=order.notificationSentAt||""}if(status==="closed"||status==="delivered")order.completedAt=order.completedAt||now();saveState()}

    function revokeApi(){state.apiConsents.forEach(entry=>{if(entry.userId===sessionUserId()&&entry.status==="active"){entry.status="revoked";entry.revokedAt=now()}});const profile=sellerProfile(sessionUserId());if(profile)profile.apiConnected=false;saveState()}

    function renderPayroll(){const payouts=state.payouts.filter(payout=>["super_admin","coordinator"].includes(currentRole())||payout.userId===sessionUserId());return html`<div class="table-wrap panel"><h2>Payroll</h2><table><thead><tr><th>Seller</th><th>Amount</th><th>Status</th><th>Item</th><th>Notes</th><th>Action</th></tr></thead><tbody>${payouts.map(payout=>{const item=state.orderItems.find(entry=>entry.id===payout.itemId)||{};return`<tr><td>${escapeHtml(userName(payout.userId))}</td><td>${formatMoney(payout.amount||0)}</td><td>${escapeHtml(payout.status)}</td><td>${escapeHtml(item.targetName||"")}</td><td>${escapeHtml(payout.notes||"")}</td><td>${["super_admin","coordinator"].includes(currentRole())?`<select onchange="safeAction(() => updatePayoutStatus('${payout.id}', this.value),'Payout status updated.')">${PAYOUT_STATUSES.map(status=>`<option value="${status}" ${status===payout.status?"selected":""}>${status}</option>`).join("")}</select>`:"<span class='small'>Read only</span>"}</td></tr>`}).join("")||"<tr><td colspan='6'>No payouts yet.</td></tr>"}</tbody></table></div>`}
    function renderPayments(){const orders=accessibleOrders();return html`<section class="grid"><div class="span-5 stack"><div class="panel"><h2>Register payment</h2><div class="stack"><select id="payment-order">${orders.map(order=>`<option value="${order.id}">${escapeHtml(order.title)}</option>`).join("")}</select><input id="payment-amount" type="number" min="0" step="1" placeholder="Amount"><select id="payment-status">${PAYMENT_STATUSES.map(status=>`<option value="${status}">${status}</option>`).join("")}</select><textarea id="payment-note" rows="3" placeholder="Payment note"></textarea><button onclick="onAddPayment()">Save payment</button></div></div><div class="panel"><h2>Receivables</h2><div class="list">${orders.map(order=>{const financials=orderFinancials(order.id);return`<div class="item"><strong>${escapeHtml(order.title)}</strong><div class="small">Charge ${formatMoney(financials.charged)} · Received ${formatMoney(financials.received)} · Outstanding ${formatMoney(Math.max(0,financials.charged-financials.received))}</div></div>`}).join("")||"<div class='small'>No orders available.</div>"}</div></div></div><div class="span-7 table-wrap panel"><h2>Payments</h2><table><thead><tr><th>Order</th><th>Amount</th><th>Status</th><th>Recorded By</th><th>Created</th></tr></thead><tbody>${state.payments.filter(payment=>accessibleOrders().some(order=>order.id===payment.orderId)).map(payment=>`<tr><td>${escapeHtml((state.orders.find(order=>order.id===payment.orderId)||{}).title||"")}</td><td>${formatMoney(payment.amount||0)}</td><td>${escapeHtml(payment.status)}</td><td>${escapeHtml(userName(payment.createdByUserId))}</td><td>${new Date(payment.createdAt).toLocaleString()}</td></tr>`).join("")||"<tr><td colspan='5'>No payments recorded.</td></tr>"}</tbody></table></div></section>`}
    function renderTeam(){const canManage=["super_admin","lawfirm_admin","coordinator"].includes(currentRole()),firm=firmForUser(sessionUserId())||{},invites=currentRole()==="super_admin"?(state.invitations||[]).filter(invite=>invite.status==="pending"):activeInvitesForFirm(firm.id);return html`<section class="grid"><div class="span-5 stack">${canManage?`<div class="panel"><h2>Add team member</h2><div class="stack"><input id="member-name" placeholder="Display name"><input id="member-email" type="email" placeholder="Email"><input id="member-password" type="password" placeholder="Temporary password"><select id="member-role">${ROLE_OPTIONS.map(role=>`<option value="${role}">${escapeHtml(roleLabel(role))}</option>`).join("")}</select><input id="member-payout" placeholder="Payout handle (seller only)"><input id="member-rate" placeholder="Rate card (seller only)"><textarea id="member-notes" rows="3" placeholder="Notes"></textarea><button onclick="onCreateMember()">Create member</button></div></div><div class="panel"><h2>Create invite</h2><div class="stack"><input id="invite-email-create" type="email" placeholder="Invite email"><select id="invite-role-create">${ROLE_OPTIONS.map(role=>`<option value="${role}">${escapeHtml(roleLabel(role))}</option>`).join("")}</select><textarea id="invite-note-create" rows="2" placeholder="Invite note"></textarea><button onclick="onCreateInvite()">Generate invite token</button></div></div>`:""}<div class="panel"><h2>Seller approval queue</h2><div class="list">${state.sellerProfiles.map(profile=>`<div class="item"><h4>${escapeHtml(userName(profile.userId))}</h4><div class="small">${escapeHtml(profile.status)} · manual ${profile.manualCapable?"enabled":"disabled"} · API ${profile.apiConnected?"connected":"not connected"}</div><div class="small">${escapeHtml(profile.rateCard||"No rate card")} · ${escapeHtml(profile.payoutHandle||"No payout handle")}</div>${isAdmin()?`<div class="row" style="margin-top:8px"><button onclick="safeAction(() => updateSellerStatus('${profile.userId}','approved'),'Seller approved.')">Approve</button><button class="warn" onclick="safeAction(() => updateSellerStatus('${profile.userId}','suspended'),'Seller suspended.')">Suspend</button><button class="bad" onclick="safeAction(() => updateSellerStatus('${profile.userId}','rejected'),'Seller rejected.')">Reject</button></div>`:""}</div>`).join("")||"<div class='small'>No sellers registered.</div>"}</div></div><div class="panel"><h2>Open invites</h2><div class="list">${invites.map(invite=>`<div class="item"><strong>${escapeHtml(invite.email)}</strong><div class="small">${escapeHtml(firmName(invite.firmId))} · ${escapeHtml(roleLabel(invite.role))} · token ${escapeHtml(invite.token)}</div><div class="small">Expires ${escapeHtml(new Date(invite.expiresAt).toLocaleDateString())}</div></div>`).join("")||"<div class='small'>No active invites.</div>"}</div></div></div><div class="span-7 table-wrap panel"><h2>Users and memberships</h2><table><thead><tr><th>Name</th><th>Email</th><th>Firm</th><th>Role</th><th>Status</th></tr></thead><tbody>${state.memberships.filter(membership=>currentRole()==="super_admin"||membership.firmId===(firmForUser(sessionUserId())||{}).id).map(membership=>`<tr><td>${escapeHtml(userName(membership.userId))}</td><td>${escapeHtml((state.users.find(user=>user.id===membership.userId)||{}).email||"")}</td><td>${escapeHtml(firmName(membership.firmId))}</td><td>${escapeHtml(roleLabel(membership.role))}</td><td>${escapeHtml(membership.status)}</td></tr>`).join("")}</tbody></table></div></section>`}
    function renderSettings(){const firm=firmForUser(sessionUserId())||{},consent=state.apiConsents.find(entry=>entry.userId===sessionUserId()&&entry.status==="active");return html`<section class="grid"><div class="span-6 panel"><h2>API key consent</h2><p class="muted">Manual submission is always available. Connect an API key only if you want future log-based suggestions when a real backend exists.</p><div class="stack"><input id="api-scope" placeholder="Requested scope e.g. user/log custom key"><input id="api-key" placeholder="API key or placeholder"><textarea id="api-note" rows="3" placeholder="Consent note"></textarea><div class="row"><button onclick="onConnectApi()">${consent?"Update consent":"Save consent"}</button>${consent?`<button class="bad" onclick="safeAction(() => revokeApi(),'API consent revoked.')">Revoke</button>`:""}</div><div class="small">${consent?"Connected: "+escapeHtml(consent.maskedKey)+" � "+escapeHtml(consent.scope):"No active API key consent."}</div></div></div><div class="span-6 panel"><h2>Firm integration</h2><div class="stack"><input id="firm-name" value="${escapeHtml(firm.name||"")}" placeholder="Firm name"><input id="firm-webhook" value="${escapeHtml(firm.discordWebhook||"")}" placeholder="Discord webhook URL"><button onclick="onSaveFirmSettings()">Save firm settings</button><div class="small">Discord is treated as a notification channel only. Orders and payroll still live in this portal.</div></div></div></section>`}
    function renderPolicies(){return html`<section class="grid"><div class="span-6 panel"><h2>Privacy Policy</h2><p class="muted">This portal stores account identity, firm memberships, orders, targets, submissions, customer payments, staff payouts, notification logs and optional API consent details. API keys are optional and only intended for future automation with explicit consent. Users must be able to revoke keys and request data removal in a production deployment.</p></div><div class="span-6 panel"><h2>API Usage Policy</h2><p class="muted">Use documented Torn API capabilities only. Do not scrape Torn pages for automation. Request the narrowest custom key scope possible, state what is collected, why it is collected and how long it is retained. Manual spy submission remains available without API key access.</p></div></section>`}
    function onLogin(){safeAction(()=>login(document.getElementById("login-email").value,document.getElementById("login-password").value),"Logged in.")}
    function onAcceptInvite(){safeAction(()=>acceptInvite({token:document.getElementById("invite-token").value,name:document.getElementById("invite-name").value,password:document.getElementById("invite-password").value,payoutHandle:document.getElementById("invite-payout").value,rateCard:document.getElementById("invite-rate").value,notes:document.getElementById("invite-notes").value}),"Invite accepted.")}
    function onRegisterSeller(){safeAction(()=>registerSeller({name:document.getElementById("seller-name").value,email:document.getElementById("seller-email").value,password:document.getElementById("seller-password").value,payoutHandle:document.getElementById("seller-payout").value,rateCard:document.getElementById("seller-rate").value,specialties:"",notes:document.getElementById("seller-notes").value}),"Seller account created. Await admin approval.")}
    function onRegisterClient(){safeAction(()=>registerClient({firmName:document.getElementById("client-firm").value,name:document.getElementById("client-name").value,email:document.getElementById("client-email").value,password:document.getElementById("client-password").value}),"Law firm account created.")}
    function onCreateMember(){safeAction(()=>createMember({name:document.getElementById("member-name").value,email:document.getElementById("member-email").value,password:document.getElementById("member-password").value,role:document.getElementById("member-role").value,payoutHandle:document.getElementById("member-payout").value,rateCard:document.getElementById("member-rate").value,specialties:"",notes:document.getElementById("member-notes").value}),"Member created.")}
    function onCreateInvite(){safeAction(()=>{const token=createInvite({email:document.getElementById("invite-email-create").value,role:document.getElementById("invite-role-create").value,note:document.getElementById("invite-note-create").value});setFlash("ok","Invite created. Token: "+token)},"Invite created.")}
    function onCreateOrder(){safeAction(()=>createOrder({title:document.getElementById("order-title").value,clientFirmId:document.getElementById("order-client").value,dueDate:document.getElementById("order-due").value,agreedPrice:document.getElementById("order-price").value,defaultPayout:document.getElementById("item-payout").value,notes:document.getElementById("order-notes").value,targets:document.getElementById("order-targets").value}),"Order created.")}
    function onUpdateOrderStatus(orderId){safeAction(()=>updateOrderStatus(orderId,document.getElementById("order-status-"+orderId).value),"Order status updated.")}
    function onSubmitItem(itemId){safeAction(()=>{const rawSpy=document.getElementById("spy-"+itemId).value,item=state.orderItems.find(entry=>entry.id===itemId);if(!item)throw new Error("Item not found.");const analysis=analyzeSpyText(rawSpy,item),allowPartial=!analysis.missing.length||window.confirm("This is a partial spy. Missing: "+analysis.missing.join(", ")+". Submit anyway?");if(!allowPartial)throw new Error("Submit cancelled. Partial spy was not submitted.");return submitItem({itemId,rawSpy,completedByUserId:document.getElementById("done-by-"+itemId).value,payoutAmount:document.getElementById("payout-"+itemId).value,payoutStatus:"queued",payoutNotes:document.getElementById("payout-note-"+itemId).value,allowPartial})},"Spy submitted.")}
    function onAddPayment(){safeAction(()=>{const orderId=document.getElementById("payment-order").value,status=document.getElementById("payment-status").value;state.payments.unshift({id:uid("pay"),orderId,amount:Number(document.getElementById("payment-amount").value||0),status,note:document.getElementById("payment-note").value.trim(),createdByUserId:sessionUserId(),createdAt:now()});const order=state.orders.find(entry=>entry.id===orderId);if(order&&(status==="refunded"||status==="waived"))order.paymentStatus=status;reconcilePaymentStatus(orderId);state.notifications.unshift({id:uid("note"),type:"payment_recorded",orderId,status,createdAt:now(),message:"Payment recorded for "+((order||{}).title||"order")});saveState()},"Payment recorded.")}
    function onConnectApi(){safeAction(()=>{const key=document.getElementById("api-key").value.trim(),scope=document.getElementById("api-scope").value.trim();if(!key)throw new Error("API key is required to store consent.");state.apiConsents.forEach(entry=>{if(entry.userId===sessionUserId()&&entry.status==="active")entry.status="replaced"});state.apiConsents.unshift({id:uid("consent"),userId:sessionUserId(),maskedKey:key.slice(0,4)+"..."+key.slice(-3),scope,note:document.getElementById("api-note").value.trim(),status:"active",consentedAt:now()});const profile=sellerProfile(sessionUserId());if(profile)profile.apiConnected=true;saveState()},"API consent saved.")}
    function onSaveFirmSettings(){safeAction(()=>{const firm=firmForUser(sessionUserId());if(!firm)throw new Error("No firm found.");firm.name=document.getElementById("firm-name").value.trim()||firm.name;firm.discordWebhook=document.getElementById("firm-webhook").value.trim();saveState()},"Firm settings saved.")}
    function render(){if(me()){document.getElementById("auth").classList.add("hidden");document.getElementById("app").classList.remove("hidden");renderApp()}else{document.getElementById("app").classList.add("hidden");document.getElementById("auth").classList.remove("hidden");renderAuth()}}
    render();
  </script>
</body>
</html>
